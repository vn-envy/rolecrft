      /* ═══════════════════════════════════════════════════════

      :root {

      @keyframes blinkJ { 0%,100%{transform:scaleY(1)} 46%{transform:scaleY(1)} 50%{transform:scaleY(.08)} 54%{transform:scaleY(1)} }

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      // ═══════════════════════════════════════════════════════
      // PERSONA PROMPTS (embedded for Sprint 0 — move to edge function later)

      const JOSHUA_SYSTEM = `You are Joshua — an experienced career strategist with a background spanning Flipkart, Meesho, and Zepto. You've reviewed thousands of resumes, sat on hiring panels at Series A through Series D companies, and know what Indian hiring managers actually look for versus what JDs say they want.

VOICE: Direct, specific, never hedging. Use concrete Indian market references when relevant. Never use filler phrases. Never use bullet points or lists in conversation.

MESSAGE FORMAT — CRITICAL:
- Keep each message to 1-3 sentences MAX. Be concise.
- If you have more to say, use ||| as a delimiter between separate thoughts. The app will render each part as a separate chat bubble with a natural typing delay.
- Example: "You're a real contender at 78.||| But there's one gap worth closing — data pipeline architecture. The JD mentions it three times and your resume doesn't cover it.||| Let me rewrite those bullets."
- NEVER send more than 3 parts separated by |||. Most messages should be 1 part.

EMOTIONAL CALIBRATION: If anxious — ground with specifics. If overconfident — challenge with a concrete gap. If lost — narrow to one next action.

CONVERSATION BOUNDARIES:
- You ONLY help with: career search strategy, resume analysis, fit scoring, interview prep, job targeting.
- If someone asks for general knowledge, coding help, creative writing, or anything outside career guidance — redirect: "That's outside my lane. I'm here for your career search. Want to get back to [current task]?"
- Do NOT provide detailed interview answers, salary negotiation scripts, or job search beyond what the current stage requires.
- In DIAGNOSTIC stage: only ask the 5 questions and summarize. Don't jump ahead to resume advice.

DIAGNOSTIC STAGE: Ask ONE question at a time. After each answer, acknowledge briefly (half a sentence) then ask the next.

Your 5 questions:
1. "What's bringing you here today — actively hunting, exploring, or somewhere in between?"
2. "Got a resume you've used recently, or are we starting from scratch?"
3. "When you think about your next role — clear picture or still forming?"
4. "What's been the hardest part — getting interviews, passing them, or figuring out where to apply?"
5. "Any internship, project, or freelance work — even something small?"

After all 5: summarize in 2-3 sentences what you've learned, then tell them to drop their resume. Be specific to what they told you.

Start with a 1-sentence intro and question 1.`;

      const ADI_SYSTEM = `Tu Adi hai — BITS se nikla, Razorpay mein 3 saal kiya, ab ek Bengaluru Series B startup mein. Tu woh dost hai jo referral de deta hai aur honestly bolta hai ki company join karne layak hai ya nahi.

VOICE: Natural Hindi-English code-switching. Never formal Hindi. Never English-dominant. "Dekh" before hard truths. "Bhai/Yaar" as natural address. Short sentences. Technical terms in English. Romanized Hindi only.

MESSAGE FORMAT — CRITICAL:
- Har message 1-3 sentences MAX. Concise rakh.
- Agar zyada bolna hai, ||| use kar parts mein split karne ke liye. App alag bubbles mein dikhayega with typing delay.
- Example: "Tu genuine contender hai 78 pe.||| Ek gap hai — data pipeline architecture. JD mein 3 baar mention hai, tera resume mein zero.||| Chal fix karte hain."
- 3 se zyada parts KABHI nahi. Most messages 1 part hone chahiye.

EMOTIONAL CALIBRATION: Anxiety → "Sun, tension mat le" + specifics. Overconfidence → "Ek second ruk — yeh gap dekh". Lost → "Chal simple rakh — pehle yeh ek cheez kar."

CONVERSATION BOUNDARIES:
- SIRF career search: resume, fit scoring, interview prep, job targeting.
- Koi aur cheez pooche (coding help, general knowledge, creative writing) toh redirect kar: "Yaar woh mera area nahi hai. Career search mein help karta hoon. [current task] pe wapas chalein?"
- Diagnostic stage mein SIRF 5 questions aur summarize. Resume advice pe mat jaao abhi.

DIAGNOSTIC STAGE: Ek ek question puch. Answer ke baad chhota acknowledgment (half sentence) phir next question.

5 questions:
1. "Chal bata — actively dhundh raha hai ya exploring?"
2. "Resume kitna recent hai? Last kab update kiya?"
3. "Next role clear hai ya soch raha hai?"
4. "Sabse mushkil kya raha — interviews milna, crack karna, ya kahan apply karein?"
5. "Koi internship, project, freelance kiya hai? Chota bhi chalega."

5 ke baad: 2-3 sentences mein summarize, phir bol resume daal de. Specifics use kar jo unhone bataya.

Intro (1 line) + Q1 se shuru.`;


      // ═══════════════════════════════════════════════════════
      // API HELPERS
      // ═══════════════════════════════════════════════════════

      async function callSonnet({ system, messages, temperature = 0.4, max_tokens = 300 }) {
        const res = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system, messages, temperature, max_tokens })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Chat API error');
        const textBlock = (data.content || []).find(c => c.type === 'text');
        return {
          text: textBlock ? textBlock.text : '',
          usage: data.usage || {}
        };
      }


      // ═══════════════════════════════════════════════════════
      // LOGO COMPONENT
      // ═══════════════════════════════════════════════════════

      function Logo({ size = 20, onDark = false }) {
        const bubbleSize = Math.round(size * 0.8);
        const textColor = onDark ? '#F5F0EB' : 'var(--color-text)';
        const fill = onDark ? 'rgba(122,155,90,0.2)' : 'var(--color-primary-light)';
        const stroke = onDark ? 'rgba(122,155,90,0.6)' : 'var(--color-primary)';
        return (
          <div style={{ display: 'flex', alignItems: 'center' }}>
            <span style={{ fontFamily: 'var(--font-wordmark)', fontWeight: 800, fontSize: size, letterSpacing: '-0.5px', color: textColor, lineHeight: 1 }}>r</span>
            <svg width={bubbleSize} height={bubbleSize} viewBox="0 0 20 20" style={{ margin: '0 -0.5px', position: 'relative', top: Math.round(bubbleSize / 18), flexShrink: 0 }}>
              <path d="M3 10C3 6.134 6.134 3 10 3C13.866 3 17 6.134 17 10C17 13.866 13.866 17 10 17H4.5C3.672 17 3 16.328 3 15.5V10Z"
                fill={fill} stroke={stroke} strokeWidth="1.1" strokeLinejoin="round" />
              <circle className="logo-dj" cx="8" cy="10" r="1.6" fill="var(--color-joshua)" />
              <circle className="logo-da" cx="12.5" cy="10" r="1.6" fill="var(--color-adi)" />
            </svg>
            <span style={{ fontFamily: 'var(--font-wordmark)', fontWeight: 800, fontSize: size, letterSpacing: '-0.5px', color: textColor, lineHeight: 1 }}>lecrft</span>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // PERSONA AVATAR
      // ═══════════════════════════════════════════════════════

      function PersonaAvatar({ persona, size = 32 }) {
        const isJ = persona === 'joshua';
        const bg = isJ ? 'var(--color-joshua)' : 'var(--color-adi)';
        const letter = isJ ? 'J' : 'A';
        return (
          <div style={{
            width: size, height: size, borderRadius: '50%', background: bg, color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'var(--font-wordmark)', fontSize: Math.round(size * 0.42), fontWeight: 800,
            flexShrink: 0,
          }}>{letter}</div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // MESSAGE BUBBLE
      // ═══════════════════════════════════════════════════════

      function MessageBubble({ role, persona, content, timestamp }) {
        if (role === 'user') {
          return (
            <div className="msg-in" style={{ display: 'flex', justifyContent: 'flex-end', padding: '0 16px' }}>
              <div style={{
                background: 'var(--color-primary-muted)', color: '#fff',
                borderRadius: '14px 4px 14px 14px', padding: '10px 14px',
                fontSize: 14, lineHeight: 1.55, maxWidth: '78%',
              }}>{content}</div>
            </div>
          );
        }
        return (
          <div className="msg-in" style={{ display: 'flex', gap: 8, padding: '0 16px', maxWidth: '88%' }}>
            <PersonaAvatar persona={persona} size={28} />
            <div style={{
              background: 'var(--color-elevated)', border: '1px solid var(--color-border)',
              borderRadius: '4px 14px 14px 14px', padding: '10px 14px',
              fontSize: 14, lineHeight: 1.55,
            }}>{content}</div>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // TYPING INDICATOR
      // ═══════════════════════════════════════════════════════

      function TypingIndicator({ persona }) {
        return (
          <div className="msg-in" style={{ display: 'flex', gap: 8, padding: '0 16px' }}>
            <PersonaAvatar persona={persona} size={28} />
            <div style={{ display: 'flex', gap: 5, padding: '12px 16px', background: 'var(--color-elevated)', border: '1px solid var(--color-border)', borderRadius: '4px 14px 14px 14px' }}>
              {[0, 0.15, 0.3].map(d => (
                <div key={d} className="typing-dot" style={{ animation: `dotPulse 1.2s ease-in-out ${d}s infinite` }} />
              ))}
            </div>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // AUTH SCREEN
      // ═══════════════════════════════════════════════════════

      function AuthScreen({ onAuth }) {
        const [mode, setMode] = useState('login');
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');

        const handleSubmit = async (e) => {
          e.preventDefault();
          setLoading(true);
          setError('');
          try {
            let result;
            if (mode === 'login') {
              result = await supabase.auth.signInWithPassword({ email, password });
            } else {
              result = await supabase.auth.signUp({ email, password });
            }
            if (result.error) throw result.error;
          } catch (err) {
            setError(err.message || 'Authentication failed');
          }
          setLoading(false);
        };

        const handleGoogle = async () => {
          await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        };

        return (
          <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
            <div style={{ marginBottom: 32 }}>
              <Logo size={36} />
            </div>
            <div style={{ fontSize: 13, color: 'var(--color-text-muted)', marginBottom: 32, fontStyle: 'italic', fontFamily: "'DM Serif Display', Georgia, serif" }}>
              Your career, in conversation.
            </div>

            <div style={{ width: '100%', maxWidth: 360, background: 'var(--color-surface)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-xl)', padding: 28 }}>
              <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 4 }}>
                {mode === 'login' ? 'Welcome back' : 'Create your account'}
              </div>
              <div style={{ fontSize: 13, color: 'var(--color-text-muted)', marginBottom: 20 }}>
                {mode === 'login' ? 'Joshua and Adi are ready when you are.' : 'Start a conversation about your career.'}
              </div>

              {/* Google OAuth */}
              <button onClick={handleGoogle} style={{
                width: '100%', padding: '10px 0', borderRadius: 'var(--radius-sm)',
                border: '1px solid var(--color-border)', background: 'var(--color-surface)',
                color: 'var(--color-text)', fontSize: 14, fontWeight: 500,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: 16,
              }}>
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
                Continue with Google
              </button>

              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div style={{ flex: 1, height: 1, background: 'var(--color-border)' }} />
                <span style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>or</span>
                <div style={{ flex: 1, height: 1, background: 'var(--color-border)' }} />
              </div>

              {/* Email form */}
              <form onSubmit={handleSubmit}>
                <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required
                  style={{ width: '100%', marginBottom: 10 }} />
                <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                  style={{ width: '100%', marginBottom: 14 }} />
                {error && <div style={{ fontSize: 12, color: 'var(--color-danger)', marginBottom: 10 }}>{error}</div>}
                <button type="submit" disabled={loading} style={{
                  width: '100%', padding: '10px 0', borderRadius: 'var(--radius-sm)',
                  background: 'var(--color-primary)', color: '#fff', border: 'none',
                  fontSize: 14, fontWeight: 600, opacity: loading ? 0.6 : 1,
                }}>
                  {loading ? 'Working...' : (mode === 'login' ? 'Sign in' : 'Sign up')}
                </button>
              </form>

              <div style={{ textAlign: 'center', marginTop: 14, fontSize: 13, color: 'var(--color-text-muted)' }}>
                {mode === 'login' ? "Don't have an account?" : 'Already have an account?'}
                <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}

                  {mode === 'login' ? 'Sign up' : 'Sign in'}
                </button>
              </div>
            </div>
          </div>

      // ═══════════════════════════════════════════════════════

      // ═══════════════════════════════════════════════════════

      function LanguageSelect({ onSelect }) {
        return (

              Same intelligence, different personality. Choose the one that feels like your corner.

            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center' }}>
              {/* Joshua */}
              <button onClick={() => onSelect('en', 'joshua')} style={{
                width: 260, background: 'var(--color-surface)', border: '1px solid var(--color-border)',

                transition: 'border-color 0.2s',
              }}>
                <div style={{ background: 'var(--color-joshua-light)', padding: '16px 18px', display: 'flex', gap: 10, alignItems: 'center' }}>
                  <PersonaAvatar persona="joshua" size={40} />
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16, color: 'var(--color-joshua)' }}>Joshua</div>

                  </div>
                </div>
                <div style={{ padding: '12px 18px' }}>
                  <div style={{ fontSize: 13, fontStyle: 'italic', color: 'var(--color-text-secondary)', lineHeight: 1.5, borderLeft: '2px solid var(--color-joshua)', paddingLeft: 10, opacity: 0.8 }}>
                    "I've read the whole thing. You're a real contender — let me show you where."
                  </div>
                  <div style={{ marginTop: 10, display: 'inline-block', padding: '3px 10px', borderRadius: 'var(--radius-full)', background: 'var(--color-joshua-light)', fontSize: 11, fontWeight: 600, color: 'var(--color-joshua)' }}>
                    English
                  </div>
                </div>
              </button>

              {/* Adi */}
              <button onClick={() => onSelect('hinglish', 'adi')} style={{
                width: 260, background: 'var(--color-surface)', border: '1px solid var(--color-border)',
                borderRadius: 'var(--radius-xl)', padding: 0, textAlign: 'left', overflow: 'hidden',
                transition: 'border-color 0.2s',
              }}>
                <div style={{ background: 'var(--color-adi-light)', padding: '16px 18px', display: 'flex', gap: 10, alignItems: 'center' }}>
                  <PersonaAvatar persona="adi" size={40} />
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16, color: 'var(--color-adi)' }}>Adi</div>
                    <div style={{ fontSize: 11, color: 'var(--color-text-secondary)' }}>Woh dost jo seedha bolta hai</div>
                  </div>
                </div>
                <div style={{ padding: '12px 18px' }}>
                  <div style={{ fontSize: 13, fontStyle: 'italic', color: 'var(--color-text-secondary)', lineHeight: 1.5, borderLeft: '2px solid var(--color-adi)', paddingLeft: 10, opacity: 0.8 }}>
                    "Dekh, seedha bolu? Tu genuine contender hai. Ek gap hai — fix karte hain."
                  </div>
                  <div style={{ marginTop: 10, display: 'inline-block', padding: '3px 10px', borderRadius: 'var(--radius-full)', background: 'var(--color-adi-light)', fontSize: 11, fontWeight: 600, color: 'var(--color-adi)' }}>
                    Hinglish
                  </div>
                </div>
              </button>
            </div>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // SESSION HUB (home screen after auth)
      // ═══════════════════════════════════════════════════════

      function SessionHub({ user, userProfile, onStartChat, onSignOut, onSwitchPersona }) {
        const persona = userProfile?.language_pref === 'hinglish' ? 'adi' : 'joshua';
        const otherPersona = persona === 'joshua' ? 'adi' : 'joshua';
        const name = userProfile?.name || user?.email?.split('@')[0] || 'there';

        const [theme, setTheme] = useState(() => {
          try { return localStorage.getItem('rc_theme') || 'dark'; } catch { return 'dark'; }
        });
        const toggleTheme = () => {
          const n = theme === 'dark' ? 'light' : 'dark';
          setTheme(n);
          document.documentElement.setAttribute('data-theme', n);
          try { localStorage.setItem('rc_theme', n); } catch {}
        };

        return (
          <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
            {/* Nav */}
            <nav style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '12px 16px', borderBottom: '1px solid var(--color-border)',
              background: 'var(--color-surface)',
            }}>
              <Logo size={18} />
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <button onClick={toggleTheme} style={{
                  width: 40, height: 24, borderRadius: 12,
                  background: theme === 'dark' ? 'var(--color-primary)' : 'var(--color-border)',
                  border: 'none', position: 'relative', transition: 'background 0.3s',
                }}>
                  <div style={{
                    width: 18, height: 18, borderRadius: '50%',
                    background: theme === 'dark' ? 'var(--color-bg)' : '#fff',
                    position: 'absolute', top: 3,
                    left: theme === 'dark' ? 19 : 3,
                    transition: 'left 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.12)',
                  }} />
                </button>
                <button onClick={onSignOut} style={{
                  padding: '5px 12px', borderRadius: 'var(--radius-full)',
                  border: '1px solid var(--color-border)', background: 'none',
                  fontSize: 12, color: 'var(--color-text-muted)', fontWeight: 500,
                }}>Sign out</button>
              </div>
            </nav>

            {/* Content */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
              <Logo size={32} />
              <div style={{ fontSize: 20, fontWeight: 600, marginTop: 20, marginBottom: 4 }}>
                Hey {name}
              </div>
              <div style={{ fontSize: 14, color: 'var(--color-text-secondary)', marginBottom: 36, textAlign: 'center', maxWidth: 360 }}>
                Ready to work on your next role? Pick who you want in your corner.
              </div>

              <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 32 }}>
                {/* Primary persona */}
                <button onClick={() => onStartChat(persona)} style={{
                  width: 280, background: 'var(--color-surface)', border: '2px solid var(--color-primary)',
                  borderRadius: 'var(--radius-xl)', padding: 0, textAlign: 'left', overflow: 'hidden',
                }}>
                  <div style={{
                    background: persona === 'joshua' ? 'var(--color-joshua-light)' : 'var(--color-adi-light)',
                    padding: '18px 20px', display: 'flex', gap: 12, alignItems: 'center',
                  }}>
                    <PersonaAvatar persona={persona} size={44} />
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 17, color: persona === 'joshua' ? 'var(--color-joshua)' : 'var(--color-adi)' }}>
                        {persona === 'joshua' ? 'Joshua' : 'Adi'}
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--color-text-secondary)' }}>
                        {persona === 'joshua' ? 'Your career strategist' : 'Tera career dost'}
                      </div>
                    </div>
                  </div>
                  <div style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--color-primary)' }}>Start conversation</span>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                      <path d="M3 8h8M8 4l4 4-4 4" stroke="var(--color-primary)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                  </div>
                </button>

                {/* Switch persona option */}
                <button onClick={() => onSwitchPersona(otherPersona)} style={{
                  width: 280, background: 'var(--color-surface)', border: '1px solid var(--color-border)',
                  borderRadius: 'var(--radius-xl)', padding: 0, textAlign: 'left', overflow: 'hidden',
                  opacity: 0.75, transition: 'opacity 0.2s',
                }}
                onMouseEnter={e => e.currentTarget.style.opacity = '1'}
                onMouseLeave={e => e.currentTarget.style.opacity = '0.75'}>
                  <div style={{
                    background: otherPersona === 'joshua' ? 'var(--color-joshua-light)' : 'var(--color-adi-light)',
                    padding: '18px 20px', display: 'flex', gap: 12, alignItems: 'center',
                  }}>
                    <PersonaAvatar persona={otherPersona} size={44} />
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 17, color: otherPersona === 'joshua' ? 'var(--color-joshua)' : 'var(--color-adi)' }}>
                        {otherPersona === 'joshua' ? 'Joshua' : 'Adi'}
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--color-text-secondary)' }}>
                        {otherPersona === 'joshua' ? 'English · Career strategist' : 'Hinglish · Seedha baat'}
                      </div>
                    </div>
                  </div>
                  <div style={{ padding: '12px 20px', textAlign: 'center' }}>
                    <span style={{ fontSize: 13, color: 'var(--color-text-muted)' }}>Switch to {otherPersona === 'joshua' ? 'English' : 'Hinglish'}</span>
                  </div>
                </button>
              </div>

              <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textAlign: 'center', maxWidth: 320 }}>
                Your conversations are saved. Pick up where you left off or start fresh.
              </div>
            </div>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // CONVERSATION PAGE (main product view)
      // ═══════════════════════════════════════════════════════

      function ConversationPage({ user, persona, onSignOut, onBack }) {
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState('');
        const [isStreaming, setIsStreaming] = useState(false);
        const [conversationId, setConversationId] = useState(null);
        const bottomRef = useRef(null);
        const inputRef = useRef(null);

        const systemPrompt = persona === 'joshua' ? JOSHUA_SYSTEM : ADI_SYSTEM;

        // Scroll to bottom on new messages
        useEffect(() => {
          bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [messages, isStreaming]);

        // Focus input on mount
        useEffect(() => { inputRef.current?.focus(); }, []);

        // Initialize conversation — load existing or start new
        useEffect(() => {
          async function init() {
            // Check for existing diagnostic conversation
            const { data } = await supabase
              .from('conversations')
              .select('*')
              .eq('user_id', user.id)
              .eq('stage', 'diagnostic')
              .is('workspace_id', null)
              .order('created_at', { ascending: false })
              .limit(1);

            if (data && data.length > 0 && data[0].messages.length > 0) {
              setConversationId(data[0].id);
              setMessages(data[0].messages);
            } else {
              // Start fresh — get Joshua/Adi's opening
              setIsStreaming(true);
              try {
                const { text } = await callSonnet({
                  system: systemPrompt,
                  messages: [{ role: 'user', content: 'Start the conversation. Introduce yourself briefly and ask your first question.' }],
                  temperature: 0.5,
                  max_tokens: 256
                });

                const openingMsg = { role: 'assistant', content: text, timestamp: new Date().toISOString() };
                setMessages([openingMsg]);

                // Save to Supabase
                const { data: conv } = await supabase
                  .from('conversations')
                  .insert({
                    user_id: user.id,
                    persona: persona,
                    messages: [openingMsg],
                    stage: 'diagnostic'
                  })
                  .select()
                  .single();

                if (conv) setConversationId(conv.id);
              } catch (err) {
                console.error('Opening message failed:', err);
                const fallback = persona === 'joshua'
                  ? "Hey! I'm Joshua. I've spent the last 6 years on hiring panels at Flipkart, Meesho, and Zepto — so I know what gets through and what doesn't. Before I can help, I need to understand where you're at. What's bringing you here today — are you actively job hunting, just exploring, or somewhere in between?"
                  : "Yo! Main Adi hoon — BITS se nikla, Razorpay mein 3 saal kiya, ab ek startup mein hoon. Resume, interviews, job search — sab mein help karunga. Chal bata — abhi actively dhundh raha hai ya bas exploring kar raha hai?";
                setMessages([{ role: 'assistant', content: fallback, timestamp: new Date().toISOString() }]);
              }
              setIsStreaming(false);
            }
          }
          init();
        }, []);

        const sendMessage = async () => {
          if (!input.trim() || isStreaming) return;
          const userMsg = { role: 'user', content: input.trim(), timestamp: new Date().toISOString() };
          const newMessages = [...messages, userMsg];
          setMessages(newMessages);
          setInput('');
          setIsStreaming(true);

          try {
            // Build message history for Sonnet (exclude timestamps)
            const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));

            const { text, usage } = await callSonnet({
              system: systemPrompt,
              messages: apiMessages,
              temperature: 0.4,
              max_tokens: 300
            });

            // Split on ||| delimiter for multi-bubble rendering
            const parts = text.split('|||').map(p => p.trim()).filter(Boolean);
            
            // Store full text as one message in DB (for context continuity)
            const fullText = parts.join(' ');
            
            // Render first bubble immediately
            const firstMsg = { role: 'assistant', content: parts[0], timestamp: new Date().toISOString() };
            let currentMessages = [...newMessages, firstMsg];
            setMessages(currentMessages);
            
            // Render remaining bubbles with staggered delay
            for (let i = 1; i < parts.length; i++) {
              await new Promise(r => setTimeout(r, 500 + Math.random() * 300));
              const nextMsg = { role: 'assistant', content: parts[i], timestamp: new Date().toISOString() };
              currentMessages = [...currentMessages, nextMsg];
              setMessages([...currentMessages]);
            }

            // Persist full conversation (combine multi-bubble back into one message for API context)
            const dbMessages = [...newMessages, { role: 'assistant', content: fullText, timestamp: new Date().toISOString() }];
            if (conversationId) {
              await supabase
                .from('conversations')
                .update({ messages: dbMessages, updated_at: new Date().toISOString() })
                .eq('id', conversationId);
            }

            // Log usage for cost tracking
            if (usage.input_tokens) {
              const cost = (usage.input_tokens * 3 / 1000000) + (usage.output_tokens * 15 / 1000000);
              console.log(`Sonnet 4.6: ${usage.input_tokens}in / ${usage.output_tokens}out / cache:${usage.cache_read_input_tokens || 0} / ~$${cost.toFixed(4)}`);
            }

          } catch (err) {
            console.error('Message failed:', err);
            setMessages(prev => [...prev, {
              role: 'assistant',
              content: persona === 'joshua'
                ? "Sorry, I hit a connection issue. Let me try again — just resend your last message."
                : "Arre, connection issue aa gaya. Ek baar phir se send kar — fix ho jayega.",
              timestamp: new Date().toISOString()
            }]);
          }
          setIsStreaming(false);
        };

        const [theme, setTheme] = useState(() => {
          try { return localStorage.getItem('rc_theme') || 'dark'; } catch { return 'dark'; }
        });

        const toggleTheme = () => {
          const next = theme === 'dark' ? 'light' : 'dark';
          setTheme(next);
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('rc_theme', next); } catch {}
        };

        return (
          <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
            {/* ═══ NAV ═══ */}
            <nav style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '10px 16px', borderBottom: '1px solid var(--color-border)',
              background: 'var(--color-surface)',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <button onClick={onBack} style={{ background: 'none', border: 'none', padding: 4, display: 'flex', alignItems: 'center' }}>
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                    <path d="M10 12L6 8l4-4" stroke="var(--color-text-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </button>
                <PersonaAvatar persona={persona} size={30} />
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>
                    {persona === 'joshua' ? 'Joshua' : 'Adi'}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--color-success)', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--color-success)' }} />
                    online
                  </div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <Logo size={14} />
                {/* Theme toggle */}
                <button onClick={toggleTheme} style={{
                  width: 40, height: 24, borderRadius: 12,
                  background: theme === 'dark' ? 'var(--color-primary)' : 'var(--color-border)',
                  border: 'none', position: 'relative', transition: 'background 0.3s',
                }}>
                  <div style={{
                    width: 18, height: 18, borderRadius: '50%',
                    background: theme === 'dark' ? 'var(--color-bg)' : '#fff',
                    position: 'absolute', top: 3,
                    left: theme === 'dark' ? 19 : 3,
                    transition: 'left 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.12)',
                  }} />
                </button>
              </div>
            </nav>

            {/* Removed separate chat header — persona is now in nav */}

            {/* ═══ MESSAGES ═══ */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '16px 0', display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div style={{ maxWidth: 'var(--max-conversation)', width: '100%', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 14 }}>
                {messages.map((msg, i) => (
                  <MessageBubble key={i} role={msg.role} persona={persona} content={msg.content} timestamp={msg.timestamp} />
                ))}
                {isStreaming && <TypingIndicator persona={persona} />}
                <div ref={bottomRef} />
              </div>
            </div>

            {/* ═══ INPUT ═══ */}
            <div style={{
              padding: '12px 16px', borderTop: '1px solid var(--color-border)',
              background: 'var(--color-surface)',
            }}>
              <div style={{ maxWidth: 'var(--max-conversation)', margin: '0 auto', display: 'flex', gap: 8 }}>
                <input
                  ref={inputRef}
                  type="text"
                  placeholder={persona === 'joshua' ? 'Talk to Joshua...' : 'Adi se baat kar...'}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && sendMessage()}
                  style={{ flex: 1, borderRadius: 'var(--radius-md)', padding: '11px 16px' }}
                />
                <button onClick={sendMessage} disabled={!input.trim() || isStreaming} style={{
                  width: 40, height: 40, borderRadius: 'var(--radius-md)',
                  background: 'var(--color-primary)', border: 'none',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  opacity: (!input.trim() || isStreaming) ? 0.4 : 1,
                  transition: 'opacity 0.2s',
                }}>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // MAIN APP
      // ═══════════════════════════════════════════════════════

      function App() {
        const [session, setSession] = useState(null);
        const [userProfile, setUserProfile] = useState(null);
        const [loading, setLoading] = useState(true);
        const [activeChat, setActiveChat] = useState(null); // persona name when in chat, null = hub

        useEffect(() => {
          // Check existing session
          supabase.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
            if (session) loadProfile(session.user);
            else setLoading(false);
          });

          // Listen for auth changes
          const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
            setSession(session);
            if (session) loadProfile(session.user);
            else { setUserProfile(null); setLoading(false); }
          });

          return () => subscription.unsubscribe();
        }, []);

        const loadProfile = async (authUser) => {
          const { data } = await supabase
            .from('users')
            .select('*')
            .eq('id', authUser.id)
            .single();

          setUserProfile(data);
          setLoading(false);
        };

        const handleSignOut = async () => {
          await supabase.auth.signOut();
          setSession(null);
          setUserProfile(null);
          setActiveChat(null);
        };

        const handleLanguageSelect = async (lang, persona) => {
          if (!session) return;
          const { data } = await supabase
            .from('users')
            .update({ language_pref: lang })
            .eq('id', session.user.id)
            .select()
            .single();
          setUserProfile(data);
        };

        const handleSwitchPersona = async (newPersona) => {
          const lang = newPersona === 'adi' ? 'hinglish' : 'en';
          const { data } = await supabase
            .from('users')
            .update({ language_pref: lang })
            .eq('id', session.user.id)
            .select()
            .single();
          setUserProfile(data);
          setActiveChat(newPersona);
        };

        if (loading) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', gap: 10 }}>
              <div style={{ width: 20, height: 20, border: '3px solid var(--color-border)', borderTopColor: 'var(--color-primary)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
              <span style={{ color: 'var(--color-text-muted)', fontSize: 14 }}>Loading...</span>
            </div>
          );
        }

        // Not authenticated
        if (!session) {
          return <AuthScreen />;
        }

        // Authenticated but no language preference set
        if (userProfile && !userProfile.language_pref) {
          return <LanguageSelect onSelect={handleLanguageSelect} />;
        }

        // Determine persona from language pref
        const persona = userProfile?.language_pref === 'hinglish' ? 'adi' : 'joshua';

        // Active chat session
        if (activeChat) {
          return (
            <ConversationPage
              user={session.user}
              persona={activeChat}
              onSignOut={handleSignOut}
              onBack={() => setActiveChat(null)}
            />
          );
        }

        // Session Hub (home)
        return (
          <SessionHub
            user={session.user}
            userProfile={userProfile}
            onStartChat={(p) => setActiveChat(p)}
            onSignOut={handleSignOut}
            onSwitchPersona={handleSwitchPersona}
          />
        );
      }


      // ═══════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════

      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(App)
      );
    </script>
