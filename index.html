      const ADI_SYSTEM = `Main Adi hoon — BITS se nikla, Razorpay mein 3 saal kiya, ab ek Bengaluru Series B startup mein hoon. Main woh dost hoon jo referral deta hai aur honestly bolta hai ki company join karne layak hai ya nahi.

      // ═══════════════════════════════════════════════════════
      // API HELPERS
      // ═══════════════════════════════════════════════════════

      // Model routing: 'haiku' for conversation, 'sonnet' for voice moments
      async function callLLM({ system, messages, temperature = 0.4, max_tokens = 300, model = 'haiku' }) {
        const res = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system, messages, temperature, max_tokens, model })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Chat API error');
        const textBlock = (data.content || []).find(c => c.type === 'text');
        return {
          text: textBlock ? textBlock.text : '',
          usage: data.usage || {},
          cost: data.cost || {},
          model: data.model || model
        };
      }

      // Serper search
      async function callSearch(queries) {
        try {
          const res = await fetch("/.netlify/functions/search", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ queries })
          });
          const data = await res.json();
          return data.searchAvailable ? data.results : null;
        } catch (err) { console.warn('Search unavailable:', err.message); return null; }
      }

      // Split long messages into bubbles — client-side fallback when ||| not present
      function splitIntoBubbles(text) {
        // First try the ||| delimiter
        if (text.includes('|||')) {
          return text.split('|||').map(p => p.trim()).filter(Boolean);
        }
        // Fallback: if message is >200 chars, split at sentence boundaries
        if (text.length > 200) {
          const sentences = text.match(/[^.!?]+[.!?]+\s*/g) || [text];
          const bubbles = [];
          let current = '';
          for (const s of sentences) {
            if ((current + s).length > 180 && current.length > 0) {
              bubbles.push(current.trim());
              current = s;
            } else {
              current += s;
            }
          }
          if (current.trim()) bubbles.push(current.trim());
          // Cap at 3 bubbles max
          if (bubbles.length > 3) {
            return [bubbles[0], bubbles.slice(1, -1).join(' '), bubbles[bubbles.length - 1]];
          }
          return bubbles.length > 1 ? bubbles : [text];
        }
        return [text];
      }

      // Session cost tracker
      let sessionCost = 0;

      // ═══════════════════════════════════════════════════════
      // SPRINT 1: ENGINE FUNCTIONS (Groq, scoring, parsing)
      // ═══════════════════════════════════════════════════════

      function extractJsonObject(raw) {
        const text = (raw || "").trim().replace(/```json\s*/gi, "").replace(/```\s*/g, "");
        const s = text.indexOf("{"), e = text.lastIndexOf("}");
        if (s === -1 || e === -1 || e <= s) throw new Error("No JSON in response");
        return JSON.parse(text.slice(s, e + 1));
      }

      const GROQ_FALLBACKS = { 'openai/gpt-oss-120b': 'llama-3.3-70b-versatile', 'qwen/qwen3-32b': 'llama-3.3-70b-versatile', 'llama-3.1-8b-instant': 'llama-3.3-70b-versatile' };
      async function callGroq(prompt, opts = {}) {
        const { temperature = 0.2, max_tokens = 4096, model = 'qwen/qwen3-32b', retries = 2, _fb = false } = opts;
        const fp = prompt + '\n\nCRITICAL: Output ONLY a single valid JSON object.';
        for (let i = 0; i <= retries; i++) {
          const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 25000);
          try {
            const res = await fetch("/.netlify/functions/transform", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prompt: fp, temperature, max_tokens, model }), signal: ctrl.signal });
            clearTimeout(tid); const text = await res.text(); let data; try { data = JSON.parse(text); } catch { data = { error: text }; }
            if (!res.ok) throw new Error(data?.error || 'API ' + res.status);
            const found = (data.content || []).find(c => c.type === "text"); return found ? found.text : "";
          } catch (err) {
            clearTimeout(tid); const msg = err.name === 'AbortError' ? 'Timeout' : err.message;
            if (i === retries) { const fb = GROQ_FALLBACKS[model]; if (fb && !_fb) return callGroq(prompt, { ...opts, model: fb, retries: 1, _fb: true }); throw new Error(msg); }
            await new Promise(r => setTimeout(r, 1500 * (i + 1)));
          }
        }
      }

      function formatSearchContext(sr) {
        if (!sr) return ''; let ctx = '\n=== WEB SEARCH ===\n';
        Object.entries(sr).forEach(([q, items]) => { ctx += `QUERY: "${q}"\n`; items.forEach((r, i) => { ctx += `  [${i + 1}] ${r.title}\n      ${r.snippet}\n      ${r.url}\n`; }); ctx += '\n'; }); return ctx;
      }

      function runATSCheck(resumeObj, jdData) {
        const rt = [resumeObj.summary || '', ...(resumeObj.experience || []).flatMap(e => [e.title, e.company, ...(e.achievements || [])].filter(Boolean)), ...(resumeObj.skills || []), ...(resumeObj.education || []).map(e => `${e.degree} ${e.institution}`)].join(' ').toLowerCase();
        const norm = s => s.toLowerCase().replace(/\(.*?\)/g, '').replace(/[^a-z0-9+#.\s-]/g, '').trim();
        const aliases = { 'javascript': ['js', 'javascript'], 'typescript': ['ts', 'typescript'], 'python': ['python', 'py'], 'machine learning': ['ml', 'machine learning'], 'amazon web services': ['aws', 'amazon web services'], 'google cloud platform': ['gcp', 'google cloud'], 'kubernetes': ['k8s', 'kubernetes'], 'postgresql': ['postgres', 'postgresql'], 'react.js': ['react', 'reactjs'], 'node.js': ['node', 'nodejs'], 'docker': ['docker', 'containerization'], 'agile': ['agile', 'scrum', 'kanban'] };
        const aLookup = {}; Object.entries(aliases).forEach(([c, al]) => al.forEach(a => { aLookup[a] = c; }));
        function found(kw) { const n = norm(kw); if (rt.includes(n)) return true; const ws = n.split(/\s+/).filter(w => w.length > 2); if (ws.length > 1 && ws.every(w => rt.includes(w))) return true; const can = aLookup[n]; if (can && (aliases[can] || []).some(a => rt.includes(a))) return true; return false; }
        const mand = (jdData.mandatorySkills || []).map(s => { const c = s.replace(/\s*\(.*?\)\s*/g, '').trim(); return { skill: c, found: found(c) }; });
        const nice = (jdData.niceToHave || []).map(s => { const c = s.replace(/\s*\(.*?\)\s*/g, '').trim(); return { skill: c, found: found(c) }; });
        const mf = mand.filter(m => m.found).length, mt = mand.length, nf = nice.filter(n => n.found).length, nt = nice.length;
        return { atsScore: Math.round((mt > 0 ? mf / mt : 1) * 70 + (nt > 0 ? nf / nt : 1) * 20 + 10), mandatory: mand, niceToHave: nice, mandatoryFound: mf, mandatoryTotal: mt, missingCritical: mand.filter(m => !m.found).map(m => m.skill) };
      }

      function computeDualScores(bd) {
        if (!bd) return { atsScore: 0, hmScore: 0, clearance: 'Grounded' };
        const g = k => { const d = bd[k]; return d ? (d.score / d.max) * 100 : 0; };
        const ats = Math.round(g('mustHaveCoverage') * .40 + g('atsStructure') * .25 + g('domainTooling') * .20 + g('responsibilitiesAlignment') * .15);
        const hm = Math.round(g('impactMetrics') * .30 + g('seniorityScope') * .25 + g('tonalityFit') * .20 + g('differentiators') * .15 + g('responsibilitiesAlignment') * .10);
        return { atsScore: ats, hmScore: hm, clearance: (ats >= 75 && hm >= 70) ? 'Cleared' : (ats < 50 || hm < 45) ? 'Grounded' : 'Conditional' };
      }

      function validateCompanyData(d) { if (!d.techStack || d.techStack.length < 2) d.techStack = d.techStack || ["Not specified"]; if (!d.coreValues || d.coreValues.length < 2) d.coreValues = d.coreValues || ["Not specified"]; if (!d.culturalTone) d.culturalTone = "professional"; if (!d.emphasize) d.emphasize = ["relevant experience"]; if (!d.commonChallenges) d.commonChallenges = []; if (!d.redFlags) d.redFlags = []; return d; }
      function validateJDData(d) { if (!d.mandatorySkills || d.mandatorySkills.length < 2) d.mandatorySkills = d.mandatorySkills || []; if (!d.actionVerbs || d.actionVerbs.length < 2) d.actionVerbs = ["Led", "Built", "Designed", "Improved"]; if (!d.niceToHave) d.niceToHave = []; if (!d.responsibilityPatterns) d.responsibilityPatterns = []; return d; }

      async function parseResumeFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['pdf', 'docx', 'doc', 'txt'].includes(ext)) throw new Error('Use PDF, DOCX, or TXT.');
        let text = '';
        if (ext === 'txt') { text = await file.text(); }
        else if (ext === 'docx' || ext === 'doc') { const ab = await file.arrayBuffer(); const r = await mammoth.extractRawText({ arrayBuffer: ab }); text = r.value; }
        else if (ext === 'pdf') { const ab = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: ab }).promise; const pages = []; for (let i = 1; i <= pdf.numPages; i++) { const pg = await pdf.getPage(i); const ct = await pg.getTextContent(); pages.push(ct.items.map(it => it.str).join(' ')); } text = pages.join('\n\n'); }
        text = text.trim();
        if (text.length < 20) throw new Error('Could not extract text — may be a scanned image.');
        return text;
      }

      function MessageBubble({ role, persona, content, msgPersona }) {
        // Use message-level persona if available (for history), fall back to current
        const displayPersona = msgPersona || persona;
        if (role === 'user') {
          return (

      function FitSnapshotCard({ data }) {

        const { score, atsScore, hmScore, clearance, gaps, strengths, categories, potential } = data;

                </div>
              </div>
              <div style={{ display: 'flex', gap: 5, marginBottom: 10, flexWrap: 'wrap' }}>
                {[['ATS', atsScore], ['HM', hmScore]].map(([label, val]) => (
                  <div key={label} style={{ flex: '1 1 50px', textAlign: 'center', padding: 5, background: 'var(--color-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--color-border-light)' }}>
                    <div style={{ fontSize: 9, color: 'var(--color-text-muted)' }}>{label}</div>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600, color: val >= 65 ? 'var(--color-success)' : 'var(--color-warning)' }}>{val}</div>
                  </div>
                ))}
                {categories && Object.entries(categories).slice(0, 3).map(([k, v]) => (
                  <div key={k} style={{ flex: '1 1 50px', textAlign: 'center', padding: 5, background: 'var(--color-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--color-border-light)' }}>
                    <div style={{ fontSize: 8, color: 'var(--color-text-muted)', textTransform: 'uppercase' }}>{k.replace(/([A-Z])/g, ' $1').trim().split(' ').slice(0, 2).join(' ')}</div>

                  </div>
                ))}
              </div>
              {gaps && gaps.length > 0 && (
                <div style={{ background: 'var(--color-accent-light)', borderRadius: 'var(--radius-sm)', padding: 8, marginBottom: 6 }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: 'var(--color-accent)', marginBottom: 3 }}>GAPS</div>

      function ConversationPage({ user, initialPersona, onSignOut, onBack }) {
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState('');
        const [isStreaming, setIsStreaming] = useState(false);
        const [conversationId, setConversationId] = useState(null);
        const [activePersona, setActivePersona] = useState(initialPersona);
        const [switchCount, setSwitchCount] = useState(0);
        const MAX_SWITCHES = 2;
        const [stage, setStage] = useState('diagnostic');
        const [resumeText, setResumeText] = useState('');
        const [jdText, setJdText] = useState('');
        const [workspaceId, setWorkspaceId] = useState(null);
        const [fitData, setFitData] = useState(null);
        const [analysisStatus, setAnalysisStatus] = useState('');
        const [uploadingFile, setUploadingFile] = useState(false);
        const [showPasteResume, setShowPasteResume] = useState(false);
        const bottomRef = useRef(null);
        const inputRef = useRef(null);
        const fileInputRef = useRef(null);

        const getSysPrompt = () => activePersona === 'joshua' ? JOSHUA_SYSTEM : ADI_SYSTEM;
        useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isStreaming, analysisStatus]);
        useEffect(() => { if (stage !== 'analyzing') inputRef.current?.focus(); }, [stage]);

        useEffect(() => {
          async function init() {
            const { data } = await supabase.from('conversations').select('*').eq('user_id', user.id).order('created_at', { ascending: false }).limit(1);
            if (data && data.length > 0 && data[0].messages.length > 0) {
              setConversationId(data[0].id); setMessages(data[0].messages); setStage(data[0].stage || 'diagnostic');
              const ps = data[0].messages.filter(m => m.role === 'assistant').map(m => m.persona);
              let sw = 0; for (let i = 1; i < ps.length; i++) { if (ps[i] && ps[i-1] && ps[i] !== ps[i-1]) sw++; } setSwitchCount(sw);
            } else {
              setIsStreaming(true);
              try {
                const { text, cost } = await callLLM({ system: getSysPrompt(), messages: [{ role: 'user', content: 'Start the conversation. Introduce yourself briefly and ask your first question.' }], temperature: 0.5, max_tokens: 200, model: 'haiku' });
                sessionCost += (cost.total || 0);
                const msg = { role: 'assistant', content: text, timestamp: new Date().toISOString(), persona: activePersona };
                setMessages([msg]);
                const { data: conv } = await supabase.from('conversations').insert({ user_id: user.id, persona: activePersona, messages: [msg], stage: 'diagnostic' }).select().single();
                if (conv) setConversationId(conv.id);
              } catch (err) {
                const fb = activePersona === 'joshua' ? "Hey! I'm Joshua — ex-Flipkart/Meesho hiring panels. What's bringing you here today?" : "Hey! Main Adi hoon — BITS, Razorpay. Chal bata — actively dhundh rahe ho ya exploring?";
                setMessages([{ role: 'assistant', content: fb, timestamp: new Date().toISOString(), persona: activePersona }]);
              }
              setIsStreaming(false);
            }
          }
          init();
        }, []);

        const togglePersona = () => {
          if (switchCount >= MAX_SWITCHES) return;
          const next = activePersona === 'joshua' ? 'adi' : 'joshua';
          const sw = { role: 'system_switch', content: `Switched to ${next === 'joshua' ? 'Joshua (English)' : 'Adi (Hinglish)'}`, timestamp: new Date().toISOString(), persona: next };
          const nm = [...messages, sw]; setMessages(nm); setActivePersona(next); setSwitchCount(p => p + 1);
          if (conversationId) supabase.from('conversations').update({ messages: nm, persona: next }).eq('id', conversationId);
        };

        function isJobSearchIntent(t) { return /find.*role|find.*job|search.*role|search.*job|role.*for me|role.*dhundh|job.*dhundh|suggest.*role|koi.*acha.*role|koi.*job|good.*role|roles.*mere/.test(t.toLowerCase()); }

        async function handleJobSearch(userText) {
          const ctx = messages.slice(-8).map(m => m.content).join(' ');
          let queries;
          try {
            const { text: qJ } = await callLLM({ system: 'Extract job search params. Return ONLY JSON: {"role":"","location":"","keywords":[]}', messages: [{ role: 'user', content: `Context:\n${ctx}\nRequest: "${userText}"` }], temperature: 0.1, max_tokens: 100, model: 'haiku' });
            const p = JSON.parse(qJ.replace(/```json?\s*/g, '').replace(/```/g, '').trim());
            queries = [`${p.role} jobs ${p.location || 'India'} site:linkedin.com/jobs`, `${p.role} hiring ${p.location || 'India'} site:naukri.com OR site:wellfound.com`, `${(p.keywords || [])[0] || p.role} positions India`].filter(q => q.length > 10);
          } catch { queries = [`${userText.replace(/find|search|me|for|the|koi|role|job|bata/gi, '').trim()} jobs India site:linkedin.com/jobs`]; }
          const results = await callSearch(queries);
          if (!results) return null;
          let jobs = []; Object.values(results).forEach(items => (items || []).forEach(r => { if (r.title && r.url && !jobs.find(j => j.url === r.url)) jobs.push({ title: r.title, url: r.url, snippet: (r.snippet || '').slice(0, 200) }); }));
          return jobs.slice(0, 5);
        }

        function trimForAPI(msgs) { return msgs.filter(m => m.role === 'user' || m.role === 'assistant').slice(-6).map(m => ({ role: m.role, content: m.content })); }

        const handleFile = async (file) => {
          if (!file) return; setUploadingFile(true);
          try {
            const text = await parseResumeFile(file); setResumeText(text);
            const um = { role: 'user', content: `Uploaded: ${file.name}`, timestamp: new Date().toISOString() };
            const sm = { role: 'status', content: `Resume parsed — ${text.split(/\s+/).length} words` };
            const nm = [...messages, um, sm]; setMessages(nm);
            await supabase.from('resumes').insert({ user_id: user.id, raw_text: text, is_master: true, version: 1 });
            setIsStreaming(true);
            const { text: reply, cost } = await callLLM({ system: getSysPrompt() + '\n\nUser uploaded their resume. Acknowledge briefly and ask them to paste the job description.', messages: [{ role: 'user', content: 'I uploaded my resume.' }], temperature: 0.4, max_tokens: 150, model: 'haiku' });
            sessionCost += (cost.total || 0);
            const am = { role: 'assistant', content: reply, timestamp: new Date().toISOString(), persona: activePersona };
            const final = [...nm, am]; setMessages(final); setStage('intake');
            if (conversationId) await supabase.from('conversations').update({ messages: final, stage: 'intake' }).eq('id', conversationId);
            setIsStreaming(false);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'assistant', content: `Could not read file — ${err.message}. Paste text instead.`, timestamp: new Date().toISOString(), persona: activePersona }]);
            setIsStreaming(false);
          }
          setUploadingFile(false);
        };

        const handleJdSubmit = async () => {
          if (!jdText.trim()) return;
          const jd = jdText.trim(); setStage('analyzing'); setJdText('');
          const um = { role: 'user', content: jd.length > 200 ? jd.slice(0, 200) + '...' : jd, timestamp: new Date().toISOString() };
          let nm = [...messages, um]; setMessages(nm);
          try {
            setAnalysisStatus('Extracting role details...');
            const { text: eJ } = await callLLM({ system: 'Extract company and role. Return ONLY JSON: {"company":"","role":""}', messages: [{ role: 'user', content: jd.slice(0, 2000) }], temperature: 0.1, max_tokens: 80, model: 'haiku' });
            let ext; try { ext = extractJsonObject(eJ); } catch { ext = { company: 'Target Company', role: 'Target Role' }; }
            const { data: ws } = await supabase.from('workspaces').insert({ user_id: user.id, role_title: ext.role, company: ext.company, jd_raw: jd, status: 'analyzing' }).select().single();
            if (ws) { setWorkspaceId(ws.id); if (conversationId) await supabase.from('conversations').update({ workspace_id: ws.id }).eq('id', conversationId); }
            nm = [...nm, { role: 'status', content: `${ext.role} at ${ext.company}` }]; setMessages(nm);

            setAnalysisStatus('Researching ' + ext.company + '...');
            const sr = await callSearch([`${ext.company} engineering culture tech stack`, `${ext.company} ${ext.role} interview`, `${ext.company} glassdoor reviews`]);
            const sCtx = formatSearchContext(sr);
            const cRaw = await callGroq(`Analyze ${ext.company} for ${ext.role}.\n${sCtx}\n${sr ? 'Use search as PRIMARY.' : 'Use training knowledge.'}\nReturn JSON: {"techStack":[],"coreValues":[],"interviewFocus":"","culturalTone":"","commonChallenges":[],"redFlags":[],"emphasize":[],"sourcedFrom":"${sr ? 'web' : 'training'}"}`, { model: 'openai/gpt-oss-120b', max_tokens: 2500 });
            const companyData = validateCompanyData(extractJsonObject(cRaw));

            setAnalysisStatus('Parsing JD...');
            const jRaw = await callGroq(`Parse this JD.\n\nJD:\n${jd}\n\nReturn JSON: {"mandatorySkills":[],"niceToHave":[],"actionVerbs":[],"responsibilityPatterns":[],"hiddenRequirements":[],"seniorityIndicators":[],"winningPhrases":[]}`, { model: 'llama-3.1-8b-instant', max_tokens: 2500, temperature: 0.1 });
            const jdData = validateJDData(extractJsonObject(jRaw));
            if (ws) await supabase.from('workspaces').update({ jd_parsed: jdData, company_data: companyData }).eq('id', ws.id);

            setAnalysisStatus('Scoring fit...');
            const sP = `Score resume vs JD.\n\nRESUME:\n${resumeText.slice(0, 3000)}\n\nCOMPANY: ${JSON.stringify(companyData)}\nJD: ${JSON.stringify(jdData)}\nTARGET: ${ext.role} at ${ext.company}\n\nRubric(100): MustHave(30), Responsibilities(12), Tonality(8), Metrics(15), Seniority(10), ATS(10), Tooling(10), Differentiators(5).\n\nReturn JSON: {"matchScore":0,"scoreBreakdown":{"mustHaveCoverage":{"score":0,"max":30,"detail":""},"responsibilitiesAlignment":{"score":0,"max":12,"detail":""},"tonalityFit":{"score":0,"max":8,"detail":""},"impactMetrics":{"score":0,"max":15,"detail":""},"seniorityScope":{"score":0,"max":10,"detail":""},"atsStructure":{"score":0,"max":10,"detail":""},"domainTooling":{"score":0,"max":10,"detail":""},"differentiators":{"score":0,"max":5,"detail":""}},"topGaps":[{"item":"","impact":"","reason":""}],"topStrengths":[""],"potentialScoreAfter":0}`;
            const scRaw = await callGroq(sP, { model: 'openai/gpt-oss-120b', max_tokens: 3000, temperature: 0.1 });
            const sd = extractJsonObject(scRaw);
            const dual = computeDualScores(sd.scoreBreakdown);
            const fit = { score: sd.matchScore, atsScore: dual.atsScore, hmScore: dual.hmScore, clearance: dual.clearance, gaps: sd.topGaps || [], strengths: sd.topStrengths || [], categories: sd.scoreBreakdown, potential: sd.potentialScoreAfter, companyData, jdData };
            setFitData(fit);
            if (ws) await supabase.from('fit_snapshots').insert({ workspace_id: ws.id, overall_score: fit.score, ats_score: fit.atsScore, hm_score: fit.hmScore, category_scores: fit.categories, gaps: fit.gaps.map(g => typeof g === 'string' ? { item: g } : g), strengths: (Array.isArray(fit.strengths) ? fit.strengths : []).map(s => typeof s === 'string' ? { item: s } : s), potential_score: fit.potential });

            setAnalysisStatus('');
            const { text: verdict, cost } = await callLLM({ system: getSysPrompt() + `\n\nDeliver fit verdict. Score: ${fit.score}/100. ATS: ${fit.atsScore}. HM: ${fit.hmScore}. Clearance: ${fit.clearance}. Gaps: ${JSON.stringify(fit.gaps.slice(0, 3))}. Strengths: ${JSON.stringify(fit.strengths.slice(0, 2))}. Potential: ${fit.potential}. Lead with verdict, name gaps, name strengths. End: "Want me to rewrite your resume for this role?"`, messages: [{ role: 'user', content: `How do I stack up for ${ext.role} at ${ext.company}?` }], temperature: 0.4, max_tokens: 300, model: 'haiku' });
            sessionCost += (cost.total || 0);
            const bubbles = splitIntoBubbles(verdict);
            let final = nm;
            for (let i = 0; i < bubbles.length; i++) {
              if (i > 0) await new Promise(r => setTimeout(r, 500 + Math.random() * 300));
              final = [...final, { role: 'assistant', content: bubbles[i], timestamp: new Date().toISOString(), persona: activePersona }];
              setMessages([...final]);
            }
            final = [...final, { role: 'fit_snapshot', fitData: fit, timestamp: new Date().toISOString() }];
            setMessages([...final]); setStage('results');
            if (conversationId) await supabase.from('conversations').update({ messages: [...nm, { role: 'assistant', content: bubbles.join(' '), timestamp: new Date().toISOString(), persona: activePersona }], stage: 'results' }).eq('id', conversationId);
            console.log(`[pipeline] Groq: ~$0.00 | Haiku: $${(cost.total || 0).toFixed(4)} | Session: $${sessionCost.toFixed(4)}`);
          } catch (err) {
            console.error('Analysis error:', err); setAnalysisStatus('');
            setMessages(prev => [...prev, { role: 'assistant', content: `Analysis error: ${err.message}. Paste JD again.`, timestamp: new Date().toISOString(), persona: activePersona }]);
            setStage('intake');
          }
        };

        const sendMessage = async () => {
          if (!input.trim() || isStreaming) return;
          const ut = input.trim();
          if (stage === 'intake' && resumeText && !workspaceId) { setJdText(ut); setInput(''); setTimeout(() => handleJdSubmit(), 50); return; }
          const um = { role: 'user', content: ut, timestamp: new Date().toISOString() };
          const nm = [...messages, um]; setMessages(nm); setInput(''); setIsStreaming(true);
          try {
            let rt; let ci = {};
            if (isJobSearchIntent(ut)) {
              const jobs = await handleJobSearch(ut);
              if (jobs && jobs.length > 0) {
                const jC = jobs.map((j, i) => `${i+1}. ${j.title}\n   ${j.snippet}\n   ${j.url}`).join('\n\n');
                const { text, cost } = await callLLM({ system: getSysPrompt() + '\n\nPresent these real job listings. Include URLs. Do NOT say you cannot search.', messages: [...trimForAPI(nm), { role: 'user', content: `RESULTS:\n${jC}\n\nPresent these.` }], temperature: 0.4, max_tokens: 400, model: 'haiku' });
                rt = text; ci = cost;
              } else { rt = activePersona === 'joshua' ? "Search didn't return strong results. Be more specific — role title, company type, city?" : "Search se results nahi aaye. Thoda specific bolo — role, company type, city?"; }
            } else {
              const uc = nm.filter(m => m.role === 'user').length;
              let extra = '';
              if (stage === 'diagnostic' && uc >= 6) { setStage('intake'); extra = '\n\nDiagnostic done. Tell user to drop their resume.'; }
              const { text, cost } = await callLLM({ system: getSysPrompt() + extra, messages: trimForAPI(nm), temperature: 0.4, max_tokens: 250, model: 'haiku' });
              rt = text; ci = cost;
            }
            sessionCost += (ci.total || 0);
            const bubs = splitIntoBubbles(rt);
            let cur = nm;
            for (let i = 0; i < bubs.length; i++) {
              if (i > 0) await new Promise(r => setTimeout(r, 500 + Math.random() * 300));
              cur = [...cur, { role: 'assistant', content: bubs[i], timestamp: new Date().toISOString(), persona: activePersona }];
              setMessages([...cur]);
            }
            if (conversationId) await supabase.from('conversations').update({ messages: [...nm, { role: 'assistant', content: bubs.join(' '), timestamp: new Date().toISOString(), persona: activePersona }], stage }).eq('id', conversationId);
            console.log(`[${activePersona}|haiku] $${sessionCost.toFixed(4)}`);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'assistant', persona: activePersona, content: 'Connection issue — resend.', timestamp: new Date().toISOString() }]);
          }
          setIsStreaming(false);
        };

        const [theme, setTheme] = useState(() => { try { return localStorage.getItem('rc_theme') || 'dark'; } catch { return 'dark'; } });
        const toggleTheme = () => { const n = theme === 'dark' ? 'light' : 'dark'; setTheme(n); document.documentElement.setAttribute('data-theme', n); try { localStorage.setItem('rc_theme', n); } catch {} };
        const showFileUpload = (stage === 'intake' || stage === 'diagnostic') && !resumeText && !showPasteResume;
        const showJdInput = stage === 'intake' && resumeText && !workspaceId;

        return (
          <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
            <nav style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 16px', borderBottom: '1px solid var(--color-border)', background: 'var(--color-surface)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <button onClick={onBack} style={{ background: 'none', border: 'none', padding: 4, display: 'flex' }}><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="var(--color-text-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg></button>
                <PersonaAvatar persona={activePersona} size={30} />
                <div><div style={{ fontSize: 14, fontWeight: 600 }}>{activePersona === 'joshua' ? 'Joshua' : 'Adi'}</div><div style={{ fontSize: 10, color: 'var(--color-success)', display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--color-success)' }} />online</div></div>
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {fitData && <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--color-primary)' }}>{fitData.score}/100</span>}
                <button onClick={togglePersona} disabled={switchCount >= MAX_SWITCHES} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '3px 8px', borderRadius: 'var(--radius-full)', border: '1px solid var(--color-border)', background: 'none', fontSize: 10, opacity: switchCount >= MAX_SWITCHES ? 0.4 : 1 }}>
                  <PersonaAvatar persona={activePersona === 'joshua' ? 'adi' : 'joshua'} size={14} />{activePersona === 'joshua' ? 'Adi' : 'Josh'}
                </button>
                <Logo size={14} />
                <button onClick={toggleTheme} style={{ width: 36, height: 22, borderRadius: 11, background: theme === 'dark' ? 'var(--color-primary)' : 'var(--color-border)', border: 'none', position: 'relative' }}>
                  <div style={{ width: 16, height: 16, borderRadius: '50%', background: theme === 'dark' ? 'var(--color-bg)' : '#fff', position: 'absolute', top: 3, left: theme === 'dark' ? 17 : 3, transition: 'left .3s cubic-bezier(.34,1.56,.64,1)', boxShadow: '0 1px 2px rgba(0,0,0,.1)' }} />
                </button>
              </div>
            </nav>

            <div style={{ flex: 1, overflowY: 'auto', padding: '16px 0', display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div style={{ maxWidth: 'var(--max-conversation)', width: '100%', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 14 }}>
                {messages.map((msg, i) => {
                  if (msg.role === 'system_switch') return (<div key={i} className="msg-in" style={{ display: 'flex', justifyContent: 'center', padding: '6px 16px' }}><div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: 'var(--color-text-muted)', fontWeight: 500, background: 'var(--color-elevated)', border: '1px solid var(--color-border-light)', borderRadius: 'var(--radius-full)', padding: '3px 12px' }}><PersonaAvatar persona={msg.persona} size={14} />{msg.content}</div></div>);
                  if (msg.role === 'status') return <StatusBubble key={i} text={msg.content} />;
                  if (msg.role === 'fit_snapshot') return <FitSnapshotCard key={i} data={msg.fitData || fitData} />;
                  return <MessageBubble key={i} role={msg.role} persona={activePersona} msgPersona={msg.persona} content={msg.content} />;
                })}
                {analysisStatus && <StatusBubble text={analysisStatus} loading />}
                {isStreaming && <TypingIndicator persona={activePersona} />}
                <div ref={bottomRef} />
              </div>
            </div>

            {showFileUpload && (
              <div style={{ padding: '10px 16px', borderTop: '1px solid var(--color-border)', background: 'var(--color-surface)' }}>
                <div style={{ maxWidth: 'var(--max-conversation)', margin: '0 auto' }}>
                  <div onClick={() => fileInputRef.current?.click()} onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--color-primary)'; }} onDragLeave={e => e.currentTarget.style.borderColor = 'var(--color-border)'} onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--color-border)'; handleFile(e.dataTransfer.files[0]); }} style={{ border: '2px dashed var(--color-border)', borderRadius: 'var(--radius-md)', padding: 16, textAlign: 'center', cursor: 'pointer' }}>
                    {uploadingFile ? <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}><div style={{ width: 14, height: 14, border: '2px solid var(--color-border)', borderTopColor: 'var(--color-primary)', borderRadius: '50%', animation: 'spin .8s linear infinite' }} />Parsing...</div> : <><div style={{ fontSize: 13, fontWeight: 500, marginBottom: 3 }}>Drop your resume here</div><div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>PDF, DOCX, or TXT</div></>}
                  </div>
                  <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc,.txt" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
                  <div style={{ textAlign: 'center', marginTop: 6 }}><button onClick={() => setShowPasteResume(true)} style={{ fontSize: 11, color: 'var(--color-text-muted)', background: 'none', border: 'none', textDecoration: 'underline' }}>or paste text</button></div>
                </div>
              </div>
            )}

            {showPasteResume && !resumeText && (
              <div style={{ padding: '10px 16px', borderTop: '1px solid var(--color-border)', background: 'var(--color-surface)' }}>
                <div style={{ maxWidth: 'var(--max-conversation)', margin: '0 auto' }}>
                  <textarea placeholder="Paste resume text..." rows={5} style={{ width: '100%', marginBottom: 6 }} id="rp" />
                  <button onClick={() => { const t = document.getElementById('rp').value.trim(); if (t.length > 20) { setResumeText(t); setShowPasteResume(false); setStage('intake'); supabase.from('resumes').insert({ user_id: user.id, raw_text: t, is_master: true }); setMessages(prev => [...prev, { role: 'status', content: 'Resume — ' + t.split(/\s+/).length + ' words' }]); } }} style={{ padding: '7px 18px', borderRadius: 'var(--radius-sm)', background: 'var(--color-primary)', color: '#fff', border: 'none', fontSize: 12, fontWeight: 600 }}>Submit</button>
                </div>
              </div>
            )}

            {showJdInput && (
              <div style={{ padding: '10px 16px', borderTop: '1px solid var(--color-border)', background: 'var(--color-surface)' }}>
                <div style={{ maxWidth: 'var(--max-conversation)', margin: '0 auto' }}>
                  <textarea placeholder="Paste the job description..." rows={4} value={jdText} onChange={e => setJdText(e.target.value)} style={{ width: '100%', marginBottom: 6 }} />
                  <button onClick={handleJdSubmit} disabled={!jdText.trim()} style={{ padding: '7px 18px', borderRadius: 'var(--radius-sm)', background: 'var(--color-primary)', color: '#fff', border: 'none', fontSize: 12, fontWeight: 600, opacity: jdText.trim() ? 1 : 0.4 }}>Analyze</button>
                </div>
              </div>
            )}

            {stage !== 'analyzing' && !showFileUpload && !showPasteResume && !showJdInput && (
              <div style={{ padding: '10px 16px', borderTop: '1px solid var(--color-border)', background: 'var(--color-surface)' }}>
                <div style={{ maxWidth: 'var(--max-conversation)', margin: '0 auto', display: 'flex', gap: 8 }}>
                  <input ref={inputRef} type="text" placeholder={activePersona === 'joshua' ? 'Talk to Joshua...' : 'Adi se baat karo...'} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} style={{ flex: 1, borderRadius: 'var(--radius-md)', padding: '11px 16px' }} />
                  <button onClick={sendMessage} disabled={!input.trim() || isStreaming} style={{ width: 40, height: 40, borderRadius: 'var(--radius-md)', background: 'var(--color-primary)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: (!input.trim() || isStreaming) ? 0.4 : 1 }}>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }


      // ═══════════════════════════════════════════════════════
      // MAIN APP
      // ═══════════════════════════════════════════════════════

      function App() {
        const [session, setSession] = useState(null);
        const [userProfile, setUserProfile] = useState(null);
        const [loading, setLoading] = useState(true);
        const [activeChat, setActiveChat] = useState(null); // persona name when in chat, null = hub

        useEffect(() => {
          // Check existing session
          supabase.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
            if (session) loadProfile(session.user);
            else setLoading(false);
          });

          // Listen for auth changes
          const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
            setSession(session);
            if (session) loadProfile(session.user);
            else { setUserProfile(null); setLoading(false); }
          });

          return () => subscription.unsubscribe();
        }, []);

        const loadProfile = async (authUser) => {
          const { data } = await supabase
            .from('users')
            .select('*')
            .eq('id', authUser.id)
            .single();

          setUserProfile(data);
          setLoading(false);
        };

        const handleSignOut = async () => {
          await supabase.auth.signOut();
          setSession(null);
          setUserProfile(null);
          setActiveChat(null);
        };

        const handleLanguageSelect = async (lang, persona) => {
          if (!session) return;
          const { data } = await supabase
            .from('users')
            .update({ language_pref: lang })
            .eq('id', session.user.id)
            .select()
            .single();
          setUserProfile(data);
        };

        const handleSwitchPersona = async (newPersona) => {
          const lang = newPersona === 'adi' ? 'hinglish' : 'en';
          const { data } = await supabase
            .from('users')
            .update({ language_pref: lang })
            .eq('id', session.user.id)
            .select()
            .single();
          setUserProfile(data);
          setActiveChat(newPersona);
        };

        if (loading) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', gap: 10 }}>
              <div style={{ width: 20, height: 20, border: '3px solid var(--color-border)', borderTopColor: 'var(--color-primary)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
              <span style={{ color: 'var(--color-text-muted)', fontSize: 14 }}>Loading...</span>
            </div>
          );
        }

        // Not authenticated
        if (!session) {
          return <AuthScreen />;
        }

        // Authenticated but no language preference set
        if (userProfile && !userProfile.language_pref) {
          return <LanguageSelect onSelect={handleLanguageSelect} />;
        }

        // Determine persona from language pref
        const persona = userProfile?.language_pref === 'hinglish' ? 'adi' : 'joshua';

        // Active chat session
        if (activeChat) {
          return (
            <ConversationPage
              user={session.user}
              initialPersona={activeChat}
              onSignOut={handleSignOut}
              onBack={() => setActiveChat(null)}
            />
          );
        }

        // Session Hub (home)
        return (
          <SessionHub
            user={session.user}
            userProfile={userProfile}
            onStartChat={(p) => setActiveChat(p)}
            onSignOut={handleSignOut}
            onSwitchPersona={handleSwitchPersona}
          />
        );
      }


      // ═══════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════

      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(App)
      );
    </script>
</body>
</html>
