<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolecrft — Your career, in conversation.</title>
    <meta name="description" content="Talk to Joshua or Adi — friends who've been on the hiring panel. They'll score your fit, rebuild your resume, and prep you for the interview.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script>
      (function(){
        try { var t = localStorage.getItem('rc_theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); }
        catch(e) { document.documentElement.setAttribute('data-theme', 'dark'); }
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;gap:10px;">
        <div style="width:20px;height:20px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <span style="color:var(--color-text-muted);font-size:14px;">Loading Rolecrft...</span>
      </div>
    </div>
    <style>@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}</style>
    <script type="text/babel" data-presets="env,react" data-type="module" src="/src/main.jsx"></script>
</body>
</html>
