    <style>
      /* ═══════════════════════════════════════════════════════
         ROLECRFT v2 — Brand CSS Tokens
         ═══════════════════════════════════════════════════════ */
      :root {
        --font-wordmark: 'Nunito', sans-serif;
        --font-body: 'DM Sans', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;

        --color-primary: #5A7738;
        --color-primary-light: #E8F0DF;
        --color-primary-muted: #7A9B5A;
        --color-accent: #D4813A;
        --color-accent-light: #FFF0E6;

        --color-joshua: #4A7A8C;
        --color-joshua-light: #E6F0F6;
        --color-adi: #C7692A;
        --color-adi-light: #FDE8DC;

        --color-bg: #FAF8F5;
        --color-surface: #FFFFFF;
        --color-elevated: #FFFFFF;
        --color-text: #2C2420;
        --color-text-secondary: #7A6E65;
        --color-text-muted: #A89E95;
        --color-border: #E8E0D8;
        --color-border-light: #F0EBE4;

        --color-success: #3D8B5E;
        --color-warning: #D4913A;
        --color-danger: #C75050;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 9999px;

        --max-conversation: 680px;
      }

      /* ─── Dark Theme ─────────────────────────────── */
      html[data-theme="dark"] {
        --color-primary: #7A9B5A;
        --color-primary-light: #2A3530;
        --color-primary-muted: #5A7738;
        --color-accent: #E8905A;
        --color-accent-light: #3A2A1E;
        --color-joshua: #5A9ABD;
        --color-joshua-light: #1E2E38;
        --color-adi: #D47A4A;
        --color-adi-light: #382218;
        --color-bg: #141210;
        --color-surface: #1C1A17;
        --color-elevated: #242220;
        --color-text: #F5F0EB;
        --color-text-secondary: #A89E95;
        --color-text-muted: #7A6E65;
        --color-border: #352F2A;
        --color-border-light: #2A2725;
        --color-success: #5AAD7A;
        --color-warning: #E8A04A;
        --color-danger: #E06060;
      }

      /* ─── Base ───────────────────────────────────── */
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: var(--font-body);
        background: var(--color-bg);
        color: var(--color-text);
        transition: background 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      input, textarea, select {
        font-family: var(--font-body);
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, background 0.3s, color 0.3s;
      }
      input:focus, textarea:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(122,155,90,0.15);
      }
      input::placeholder, textarea::placeholder { color: var(--color-text-muted); }
      button { font-family: var(--font-body); cursor: pointer; }
      button:active { transform: scale(0.97); }

      /* ─── Logo blink animation ───────────────────── */
      @keyframes blinkJ { 0%,100%{transform:scaleY(1)} 46%{transform:scaleY(1)} 50%{transform:scaleY(.08)} 54%{transform:scaleY(1)} }
      @keyframes blinkA { 0%,100%{transform:scaleY(1)} 46%{transform:scaleY(1)} 50%{transform:scaleY(.08)} 54%{transform:scaleY(1)} }
      .logo-dj { transform-origin: center center; animation: blinkJ 4s ease-in-out infinite; }
      .logo-da { transform-origin: center center; animation: blinkA 4s ease-in-out .04s infinite; }

      /* ─── Chat animations ────────────────────────── */
      @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .msg-in { animation: msgIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }
      @keyframes dotPulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
      .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-muted); }

      /* ─── Scrollbar ──────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
    </style>
</head>

    <script type="text/babel">

      // ═══ FOLLOW-UP Qs (2 per character, per persona) ═══
      const FUQ = {
        ananya:{ joshua:["What did you study, and was there any part of it you actually enjoyed?","If you had to pick — structured corporate path or something more startup-ish?"], adi:["Kya padha tha, aur usme koi cheez thi jo pasand aayi?","Corporate structured ya startup wala scene — gut feeling kya hai?"]},
        rohan:{ joshua:["Tell me about that internship — what did you actually work on?","Are you targeting a specific role, or open to seeing what fits?"], adi:["Internship mein kya kaam kiya tha?","Koi specific role soch rahe ho ya open ho?"]},
        karthik:{ joshua:["What's your current role, and what about it isn't working?","When you imagine your ideal workday 2 years out — what does it look like?"], adi:["Abhi kya kar rahe ho, aur exact problem kya hai?","2 saal baad ideal workday kaisa dikhta hai?"]},
        priya:{ joshua:["What role are you targeting — do you have a specific company or JD?","How many years of experience, and what's been your strongest contribution?"], adi:["Kaunsa role target kar rahe ho — company ya JD hai specific?","Kitne saal ka experience, aur strongest contribution kya raha?"]},
        vikram:{ joshua:["Which round are you typically failing — screens, technicals, or finals?","Describe the last interview that went badly — what happened?"], adi:["Kaunse round mein usually fail ho — screen, technical, ya final?","Last kharab interview — kya hua tha?"]},
        nisha:{ joshua:["What's your current domain, and what are you switching to?","Is there anything from your current work that translates — leadership, process, data?"], adi:["Abhi kaunsa domain hai aur kis mein jaana chahte ho?","Current kaam se kuch translate hota hai — leadership, process, data?"]},
        meera:{ joshua:["How are you finding these roles — job boards, referrals, LinkedIn?","When you look at the JDs, do they match your level or are you stretching?"], adi:["Roles kaise dhundh rahe ho — boards, referrals, LinkedIn?","Jo JDs mein apply karte ho, level match hai ya stretch?"]},
      };

      // ═══ OPENING MESSAGES (context-aware, not generic) ═══
      const OPENERS = {
        ananya:{ joshua:(n)=>`Hey ${n}. You're in Ananya's shoes — starting fresh, no resume yet, figuring out direction. That's completely workable. Let me understand a bit more about you.`, adi:(n)=>`Hey ${n}. Ananya jaisi situation hai — abhi starting point pe ho, direction dhundh rahe ho. Bilkul theek hai, chal samajhte hain.`},
        rohan:{ joshua:(n)=>`Hey ${n}. You've got projects and an internship but no proper resume yet — that's Rohan's situation exactly. The raw material exists, we just need to shape it. Quick question first.`, adi:(n)=>`Hey ${n}. Projects aur internship hai but resume nahi — exactly Rohan wali situation. Material hai, bas shape dena hai. Ek question pehle.`},
        karthik:{ joshua:(n)=>`Hey ${n}. Two years in, not excited about the current path, not sure what's next — that's Karthik's spot. Before we touch any resume, let's get clear on direction.`, adi:(n)=>`Hey ${n}. Do saal ho gaye, current field mein excitement nahi hai — Karthik wali situation. Resume se pehle direction clear karte hain.`},
        priya:{ joshua:(n)=>`Hey ${n}. You know what you want but the resume isn't doing its job — Priya's exact situation. I've fixed hundreds of these. A couple of things I need to know first.`, adi:(n)=>`Hey ${n}. Role clear hai but resume kaam nahi kar raha — Priya jaisi situation. Aise bahut fix kiye hain. Do cheezein puchta hoon pehle.`},
        vikram:{ joshua:(n)=>`Hey ${n}. Getting interviews but dropping out mid-rounds — that's Vikram's problem and it's usually not about the resume. Let me figure out exactly where things are breaking.`, adi:(n)=>`Hey ${n}. Interviews mil rahe hain but middle rounds mein fail — Vikram wali problem. Resume problem nahi hoga shayad. Dekhte hain kahan break ho raha hai.`},
        nisha:{ joshua:(n)=>`Hey ${n}. Career switch with 4 years of experience that doesn't map to the new domain — Nisha's challenge. The translation is doable but I need to understand both sides first.`, adi:(n)=>`Hey ${n}. Domain switch kar rahe ho — experience hai but naye field mein translate nahi ho raha. Nisha wali challenge. Dono sides samajhna padega.`},
        meera:{ joshua:(n)=>`Hey ${n}. 50+ applications, barely hearing back — Meera's frustration. The resume might actually be fine; the problem is often targeting. Let me diagnose.`, adi:(n)=>`Hey ${n}. 50+ applications, koi response nahi — Meera jaisi frustration. Resume theek bhi ho sakta hai, problem targeting mein hogi. Diagnose karte hain.`},
      };

      // ═══ API LAYER ═══
      let sessionCost = 0;
      async function callLLM(o){const r=await fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:o.system||'',messages:o.messages,temperature:o.temperature||0.4,max_tokens:o.max_tokens||200,model:o.model||'haiku'})});const d=await r.json();if(!r.ok)throw new Error(d.error||'err');const t=(d.content||[]).find(c=>c.type==='text');return{text:t?t.text:'',cost:d.cost||{}};}
      async function callSearch(q){try{const r=await fetch("/.netlify/functions/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({queries:q})});const d=await r.json();return d.searchAvailable?d.results:null;}catch{return null;}}
      function xJSON(r){const t=(r||'').trim().replace(/```json?\s*/gi,'').replace(/```\s*/g,'');const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s===-1||e<=s)throw new Error('No JSON');return JSON.parse(t.slice(s,e+1));}
      const GFB={'openai/gpt-oss-120b':'llama-3.3-70b-versatile','llama-3.1-8b-instant':'llama-3.3-70b-versatile'};
      async function callGroq(p,o={}){const{temperature:tp=0.2,max_tokens:mt=4096,model:md='openai/gpt-oss-120b',retries:rt=2,_fb=false}=o;const fp=p+'\nOutput ONLY valid JSON.';for(let i=0;i<=rt;i++){const c=new AbortController();const t=setTimeout(()=>c.abort(),25000);try{const r=await fetch("/.netlify/functions/transform",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:fp,temperature:tp,max_tokens:mt,model:md}),signal:c.signal});clearTimeout(t);const tx=await r.text();let d;try{d=JSON.parse(tx)}catch{d={error:tx}};if(!r.ok)throw new Error(d?.error||'err');const f=(d.content||[]).find(c=>c.type==="text");return f?f.text:"";}catch(e){clearTimeout(t);if(i===rt){const fb=GFB[md];if(fb&&!_fb)return callGroq(p,{...o,model:fb,retries:1,_fb:true});throw e;}await new Promise(r=>setTimeout(r,1500*(i+1)));}}}
      function valCo(d){d.techStack=d.techStack||[];d.coreValues=d.coreValues||[];d.culturalTone=d.culturalTone||"professional";d.emphasize=d.emphasize||[];d.redFlags=d.redFlags||[];return d;}
      function valJD(d){d.mandatorySkills=d.mandatorySkills||[];d.actionVerbs=d.actionVerbs||["Led","Built","Designed"];d.niceToHave=d.niceToHave||[];d.responsibilityPatterns=d.responsibilityPatterns||[];return d;}
      function dualScore(bd){if(!bd)return{a:0,h:0,cl:'Grounded'};const g=k=>{const d=bd[k];return d?(d.score/d.max)*100:0;};const a=Math.round(g('mustHaveCoverage')*.40+g('atsStructure')*.25+g('domainTooling')*.20+g('responsibilitiesAlignment')*.15);const h=Math.round(g('impactMetrics')*.30+g('seniorityScope')*.25+g('tonalityFit')*.20+g('differentiators')*.15+g('responsibilitiesAlignment')*.10);return{a,h,cl:(a>=75&&h>=70)?'Cleared':(a<50||h<45)?'Grounded':'Conditional'};}
      function fmtSearch(sr){if(!sr)return'';let c='';Object.entries(sr).forEach(([q,items])=>{c+=`"${q}":\n`;items.forEach(r=>{c+=r.title+' - '+r.snippet+'\n';});});return c;}
      async function parseFile(f){const x=f.name.split('.').pop().toLowerCase();if(!['pdf','docx','doc','txt'].includes(x))throw new Error('Use PDF, DOCX, or TXT.');let t='';if(x==='txt')t=await f.text();else if(x==='docx'||x==='doc'){const a=await f.arrayBuffer();t=(await mammoth.extractRawText({arrayBuffer:a})).value;}else{const a=await f.arrayBuffer();const p=await pdfjsLib.getDocument({data:a}).promise;const pg=[];for(let i=1;i<=p.numPages;i++){const g=await p.getPage(i);const c=await g.getTextContent();pg.push(c.items.map(i=>i.str).join(' '));}t=pg.join('\n\n');}t=t.trim();if(t.length<20)throw new Error('Could not extract text.');return t;}

      // ═══ UI ATOMS ═══
      function Logo({size=20}){const b=Math.round(size*0.8);return <div style={{display:'flex',alignItems:'center'}}><span style={{fontFamily:'var(--font-wordmark)',fontWeight:800,fontSize:size,letterSpacing:'-0.5px',color:'var(--color-text)',lineHeight:1}}>r</span><svg width={b} height={b} viewBox="0 0 20 20" style={{margin:'0 -0.5px',position:'relative',top:Math.round(b/18),flexShrink:0}}><path d="M3 10C3 6.134 6.134 3 10 3C13.866 3 17 6.134 17 10C17 13.866 13.866 17 10 17H4.5C3.672 17 3 16.328 3 15.5V10Z" fill="var(--color-primary-light)" stroke="var(--color-primary)" strokeWidth="1.1" strokeLinejoin="round"/><circle className="logo-dj" cx="8" cy="10" r="1.6" fill="var(--color-joshua)"/><circle className="logo-da" cx="12.5" cy="10" r="1.6" fill="var(--color-adi)"/></svg><span style={{fontFamily:'var(--font-wordmark)',fontWeight:800,fontSize:size,letterSpacing:'-0.5px',color:'var(--color-text)',lineHeight:1}}>lecrft</span></div>;}

      function CIcon({char,size=28}){return <svg width={size} height={size} viewBox="0 0 20 20"><path d="M3 10C3 6.134 6.134 3 10 3C13.866 3 17 6.134 17 10C17 13.866 13.866 17 10 17H4.5C3.672 17 3 16.328 3 15.5V10Z" fill={char.color+'22'} stroke={char.color} strokeWidth="1" strokeLinejoin="round"/><circle cx="10" cy="10" r="3" fill={char.color+'44'}/><text x="10" y="10" textAnchor="middle" dominantBaseline="central" style={{fontSize:7,fontWeight:700,fill:char.color,fontFamily:'var(--font-wordmark)'}}>{char.name[0]}</text></svg>;}

      function Av({p,size=32}){const j=p==='joshua';return <div style={{width:size,height:size,borderRadius:'50%',background:j?'var(--color-joshua)':'var(--color-adi)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-wordmark)',fontSize:Math.round(size*.42),fontWeight:800,flexShrink:0}}>{j?'J':'A'}</div>;}

      function Msg({type,persona,children}){
        if(type==='user')return <div className="msg-in" style={{display:'flex',justifyContent:'flex-end',padding:'0 16px'}}><div style={{background:'var(--color-primary-muted)',color:'#fff',borderRadius:'14px 4px 14px 14px',padding:'10px 14px',fontSize:14,lineHeight:1.55,maxWidth:'78%'}}>{children}</div></div>;
        if(type==='status')return <div className="msg-in" style={{display:'flex',justifyContent:'center',padding:'4px 16px'}}><div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--color-text-muted)',fontWeight:500,background:'var(--color-elevated)',border:'1px solid var(--color-border-light)',borderRadius:'var(--radius-full)',padding:'4px 14px'}}>{children}</div></div>;
        return <div className="msg-in" style={{display:'flex',gap:8,padding:'0 16px',maxWidth:'88%'}}><Av p={persona} size={28}/><div style={{background:'var(--color-elevated)',border:'1px solid var(--color-border)',borderRadius:'4px 14px 14px 14px',padding:'10px 14px',fontSize:14,lineHeight:1.55}}>{children}</div></div>;
      }

      function Btn({label,onClick,primary,small}){return <button onClick={onClick} style={{padding:small?'6px 14px':'8px 18px',borderRadius:'var(--radius-md)',background:primary?'var(--color-primary)':'var(--color-surface)',color:primary?'#fff':'var(--color-text)',border:primary?'none':'1px solid var(--color-border)',fontSize:small?12:13,fontWeight:600,cursor:'pointer'}}>{label}</button>;}

      function FitCard({d}){if(!d)return null;const cl=d.clearance==='Cleared'?'var(--color-success)':d.clearance==='Grounded'?'var(--color-danger)':'var(--color-warning)';
        return <div className="msg-in" style={{padding:'0 16px 0 52px'}}><div style={{background:'var(--color-surface)',border:'1px solid var(--color-primary)',borderRadius:'var(--radius-lg)',padding:16,borderLeft:'3px solid var(--color-primary)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--color-primary)'}}>FIT SNAPSHOT</span><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontFamily:'var(--font-mono)',fontSize:22,fontWeight:600,color:'var(--color-primary)'}}>{d.score}</span><span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:'var(--radius-full)',background:cl+'18',color:cl}}>{d.clearance}</span></div></div>
          <div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}}>{[['ATS',d.atsScore],['HM',d.hmScore]].map(([l,v])=><div key={l} style={{flex:'1 1 50px',textAlign:'center',padding:5,background:'var(--color-elevated)',borderRadius:'var(--radius-sm)',border:'1px solid var(--color-border-light)'}}><div style={{fontSize:9,color:'var(--color-text-muted)'}}>{l}</div><div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:600,color:v>=65?'var(--color-success)':'var(--color-warning)'}}>{v}</div></div>)}</div>
          {d.gaps&&d.gaps.length>0&&<div style={{background:'var(--color-accent-light)',borderRadius:'var(--radius-sm)',padding:8,marginBottom:6}}><div style={{fontSize:9,fontWeight:700,color:'var(--color-accent)',marginBottom:3}}>GAPS</div>{d.gaps.slice(0,3).map((g,i)=><div key={i} style={{fontSize:11,color:'var(--color-text-secondary)',marginBottom:1}}>{g.item||g} — {g.reason||''}</div>)}</div>}
          {d.strengths&&d.strengths.length>0&&<div style={{background:'var(--color-primary-light)',borderRadius:'var(--radius-sm)',padding:8}}><div style={{fontSize:9,fontWeight:700,color:'var(--color-primary)',marginBottom:3}}>STRENGTHS</div>{(Array.isArray(d.strengths)?d.strengths:[d.strengths]).slice(0,3).map((s,i)=><div key={i} style={{fontSize:11,color:'var(--color-text-secondary)',marginBottom:1}}>{typeof s==='string'?s:s.item||''}</div>)}</div>}
          {d.potential&&<div style={{marginTop:8,fontSize:11,color:'var(--color-text-muted)'}}>Potential: <span style={{fontFamily:'var(--font-mono)',fontWeight:600,color:'var(--color-primary)'}}>{d.potential}</span></div>}
        </div></div>;
      }

      // ═══ AUTH ═══
      function Auth(){const[m,setM]=useState('login');const[e,setE]=useState('');const[p,setP]=useState('');const[l,setL]=useState(false);const[err,setErr]=useState('');const go=async(ev)=>{ev.preventDefault();setL(true);setErr('');try{let r;if(m==='login')r=await supabase.auth.signInWithPassword({email:e,password:p});else r=await supabase.auth.signUp({email:e,password:p});if(r.error)throw r.error;}catch(er){setErr(er.message);}setL(false);};

'none',fontSize:14,fontWeight:600,opacity:l?.6:1,cursor:'pointer'}}>{l?'...':(m==='login'?'Sign in':'Sign up')}</button></form><div style={{textAlign:'center',marginTop:14,fontSize:13,color:'var(--color-text-muted)'}}>{m==='login'?"No account?":"Have account?"}<button onClick={()=>{setM(m==='login'?'signup':'login');setErr('');}} style={{background:'none',border:'none',color:'var(--color-primary)',fontWeight:600,fontSize:13,marginLeft:4,cursor:'pointer'}}>{m==='login'?'Sign up':'Sign in'}</button></div></div></div>;
      }

      // ═══ CHARACTER SELECT (Fix 1,2,3: compact cards, icons, no pack labels, expandable) ═══

        const toggle=()=>{const n=theme==='dark'?'light':'dark';setTheme(n);document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('rc_theme',n);}catch{}};

          <div style={{flex:1,padding:'28px 16px',maxWidth:520,margin:'0 auto',width:'100%'}}>

            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {CHARS.map(c=>{

                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <CIcon char={c} size={26}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--color-text)'}}>{c.name}, {c.city}</div>
                      <div style={{fontSize:12,color:'var(--color-text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.hook}</div>
                    </div>
                    <svg width="14" height="14" viewBox="0 0 16 16" style={{flexShrink:0,transform:isOpen?'rotate(90deg)':'rotate(0)',transition:'transform 0.2s'}}><path d="M6 4l4 4-4 4" stroke="var(--color-text-muted)" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  {isOpen && <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--color-border-light)'}}>
                    <div style={{fontSize:13,color:'var(--color-text-secondary)',lineHeight:1.55,fontStyle:'italic',marginBottom:10}}>"{c.story}"</div>
                    <div style={{textAlign:'right'}}><span style={{fontSize:12,fontWeight:600,color:'var(--color-primary)'}}>This is me →</span></div>

      // ═══ PERSONA SELECT ═══
      function PersonaPick({char,onPick}){
        return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
          <Logo size={28}/><div style={{fontSize:18,fontWeight:600,marginTop:20,marginBottom:4}}>Who should help you?</div><div style={{fontSize:13,color:'var(--color-text-secondary)',marginBottom:28,textAlign:'center',maxWidth:340}}>Same intelligence, your preferred voice.</div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
            {[{id:'joshua',name:'Joshua',tag:'Direct, strategic, English',color:'var(--color-joshua)',light:'var(--color-joshua-light)'},{id:'adi',name:'Adi',tag:'Friendly, Hinglish, peer energy',color:'var(--color-adi)',light:'var(--color-adi-light)'}].map(p=><button key={p.id} onClick={()=>onPick(p.id)} style={{width:220,background:'var(--color-surface)',border:'1px solid var(--color-border)',borderRadius:'var(--radius-xl)',padding:0,textAlign:'left',overflow:'hidden',cursor:'pointer'}}><div style={{background:p.light,padding:'14px 16px',display:'flex',gap:10,alignItems:'center'}}><Av p={p.id} size={36}/><div><div style={{fontWeight:700,fontSize:15,color:p.color}}>{p.name}</div><div style={{fontSize:11,color:'var(--color-text-secondary)'}}>{p.tag}</div></div></div><div style={{padding:'12px 16px',textAlign:'center'}}><span style={{fontSize:13,fontWeight:600,color:'var(--color-primary)'}}>Start with {p.name}</span></div></button>)}
          </div>

      // ═══ MAIN CONVERSATION (Fix 4,5,6 + Sprint 1 pipeline) ═══
      function Convo({user,char,persona,onBack}){
        const[log,setLog]=useState([]);
        const[input,setInput]=useState('');
        const[step,setStep]=useState(0);
        const[answers,setAnswers]=useState({});
        const[resumeText,setResumeText]=useState('');
        const[jdText,setJdText]=useState('');
        const[fitData,setFitData]=useState(null);
        const[jobs,setJobs]=useState(null);
        const[busy,setBusy]=useState(false);
        const[status,setStatus]=useState('');
        const[mode,setMode]=useState('chat'); // 'chat'|'upload'|'paste'|'jd'
        const[actions,setActions]=useState(null);
        const bRef=useRef(null);
        const iRef=useRef(null);
        const fRef=useRef(null);
        const fqs = FUQ[char.id][persona];
        const userName = user?.email?.split('@')[0] || '';

        useEffect(()=>{bRef.current?.scrollIntoView({behavior:'smooth'});},[log,busy,status,actions,mode]);
        useEffect(()=>{if(mode==='chat')iRef.current?.focus();},[mode,step]);

        const add=(type,content,extra={})=>setLog(prev=>[...prev,{type,content,...extra}]);

        // Fix 4: Context-aware opener + first follow-up question
        useEffect(()=>{
          const opener = OPENERS[char.id][persona](userName);
          add('assistant', opener);
          setTimeout(()=>{ add('assistant', fqs[0]); setStep(1); },800);
          supabase.from('users').update({self_selected_character:char.id,persona_blend:{self_selected:char.id,type:char.type,pack:char.pack}}).eq('id',user.id);
        },[]);

        const handleAnswer=(text)=>{
          add('user',text);
          setAnswers(prev=>({...prev,['q'+step]:text}));
          if(step===1){ setTimeout(()=>{add('assistant',fqs[1]);setStep(2);},500); }
          else if(step===2){ setTimeout(()=>route({...answers,q2:text}),500); }
        };

        // Fix 5: Correct routing per character type
        const route=(ans)=>{
          setStep(3);
          const t=char.type;
          if(t==='ghost'||t==='freshgrad'){
            // Freshers: search for roles first
            add('assistant',persona==='joshua'?"Let me find some roles that match what you've described.":"Chal dekhte hain kya roles milte hain.");
            doSearch(ans);
          } else if(t==='bomber'){
            // Interview Bomber: needs JD for prep, NOT resume scoring
            add('assistant',persona==='joshua'?"Your resume is probably fine — the problem is in the interviews. Paste the JD for the role you're interviewing for, and I'll build a prep plan.":"Resume theek hi hoga — problem interviews mein hai. JD paste karo jis role ke liye interview hai, prep plan banata hoon.");
            setMode('jd'); setStep(4);
          } else if(t==='stalled'){
            // Stalled: might be targeting issue, still need resume+JD
            add('assistant',persona==='joshua'?"With 50+ applications and no callbacks, let me first check if the resume is the problem or if it's targeting. Drop your resume and the JD for a role you recently applied to.":"50+ apply karke response nahi — pehle dekhte hain resume problem hai ya targeting. Resume aur ek recent JD do.");
            setMode('upload'); setStep(4);
          } else {
            // Buried, Drifter, Switcher: resume path
            add('assistant',persona==='joshua'?"Drop your resume and I'll start working on it. If you don't have one handy, we can chat more first.":"Resume daal do, kaam shuru karta hoon. Abhi nahi hai toh baat karte hain pehle.");
            // Fix 6: offer both upload AND continue chatting
            setActions([{label:'Upload resume',action:'upload'},{label:'I want to chat more first',action:'chat'}]);
            setStep(4);
          }
        };

        // Serper search
        const doSearch=async(ctx)=>{
          setBusy(true);setStatus('Searching...');
          try{
            const field=ctx.q1||ctx.q2||char.story;
            const qs=[`${field} jobs India site:linkedin.com/jobs`,`${field} hiring India site:naukri.com OR site:wellfound.com`,`entry level ${field} India openings`];
            const sr=await callSearch(qs);
            let jl=[];if(sr)Object.values(sr).forEach(items=>(items||[]).forEach(r=>{if(r.title&&r.url&&!jl.find(j=>j.url===r.url))jl.push({title:r.title,url:r.url,snippet:(r.snippet||'').slice(0,180)});}));
            jl=jl.slice(0,5);setStatus('');
            if(jl.length>0){setJobs(jl);add('jobs',null,{jobs:jl});setActions([{label:'Upload resume for one of these',action:'upload'},{label:'Search different roles',action:'search_again'}]);}
            else{add('assistant',persona==='joshua'?"Didn't find strong matches. Try uploading your resume and a JD — I'll score directly.":"Strong matches nahi mile. Resume aur JD do, direct score karta hoon.");setActions([{label:'Upload resume',action:'upload'},{label:'Search again',action:'search_again'}]);}
          }catch{setStatus('');add('assistant','Search issue. Try uploading resume + JD instead.');setActions([{label:'Upload resume',action:'upload'}]);}
          setBusy(false);setStep(5);
        };

        // File upload
        const handleFile=async(f)=>{
          if(!f)return;setBusy(true);setMode('chat');setActions(null);
          add('status','Parsing '+f.name+'...');
          try{const t=await parseFile(f);setResumeText(t);add('status','Resume — '+t.split(/\s+/).length+' words');await supabase.from('resumes').insert({user_id:user.id,raw_text:t,is_master:true,version:1});
            setTimeout(()=>{add('assistant',persona==='joshua'?"Got it. Now paste the JD for the role you're targeting. Or if you'd rather chat first, just type.":"Resume mil gaya. Ab JD paste karo target role ka. Ya chat karna hai toh type karo.");setMode('chat');setStep(6);},400);
          }catch(e){add('assistant','Could not read — '+e.message);setMode('chat');}
          setBusy(false);
        };

        // Analysis pipeline
        const analyze=async(jd)=>{
          setMode('chat');setBusy(true);
          add('user',jd.length>150?jd.slice(0,150)+'...':jd);
          add('assistant',persona==='joshua'?'Scoring your fit — one moment.':'Fit score nikaal raha hoon — ek minute.');
          try{
            setStatus('Identifying role...');
            const{text:eJ}=await callLLM({system:'Extract company and role. ONLY JSON: {"company":"","role":""}',messages:[{role:'user',content:jd.slice(0,2000)}],temperature:0.1,max_tokens:80,model:'haiku'});
            let ext;try{ext=xJSON(eJ)}catch{ext={company:'Company',role:'Role'};}
            add('status',ext.role+' at '+ext.company);
            sessionCost+=(0.0004);

            const{data:ws}=await supabase.from('workspaces').insert({user_id:user.id,role_title:ext.role,company:ext.company,jd_raw:jd,status:'analyzing'}).select().single();

            setStatus('Researching '+ext.company+'...');
            const sr=await callSearch([ext.company+' culture tech',ext.company+' '+ext.role+' interview',ext.company+' glassdoor']);
            const cRaw=await callGroq('Analyze '+ext.company+' for '+ext.role+'.\n'+fmtSearch(sr)+'\nReturn JSON: {"techStack":[],"coreValues":[],"interviewFocus":"","culturalTone":"","redFlags":[],"emphasize":[]}',{model:'openai/gpt-oss-120b',max_tokens:2500});
            const cd=valCo(xJSON(cRaw));

            setStatus('Parsing JD...');
            const jRaw=await callGroq('Parse JD.\nJD:\n'+jd+'\nReturn JSON: {"mandatorySkills":[],"niceToHave":[],"actionVerbs":[],"responsibilityPatterns":[],"hiddenRequirements":[],"winningPhrases":[]}',{model:'llama-3.1-8b-instant',max_tokens:2500,temperature:0.1});
            const jdD=valJD(xJSON(jRaw));
            if(ws)await supabase.from('workspaces').update({jd_parsed:jdD,company_data:cd}).eq('id',ws.id);

            setStatus('Scoring...');
            const src=resumeText||(answers.q1||'')+' '+(answers.q2||'');
            const sP='Score resume vs JD.\nRESUME:\n'+src.slice(0,3000)+'\nCOMPANY:'+JSON.stringify(cd)+'\nJD:'+JSON.stringify(jdD)+'\nTARGET:'+ext.role+' at '+ext.company+'\nRubric(100):MustHave(30),Resp(12),Tone(8),Metrics(15),Seniority(10),ATS(10),Tooling(10),Diff(5).\nReturn JSON:{"matchScore":0,"scoreBreakdown":{"mustHaveCoverage":{"score":0,"max":30,"detail":""},"responsibilitiesAlignment":{"score":0,"max":12,"detail":""},"tonalityFit":{"score":0,"max":8,"detail":""},"impactMetrics":{"score":0,"max":15,"detail":""},"seniorityScope":{"score":0,"max":10,"detail":""},"atsStructure":{"score":0,"max":10,"detail":""},"domainTooling":{"score":0,"max":10,"detail":""},"differentiators":{"score":0,"max":5,"detail":""}},"topGaps":[{"item":"","reason":""}],"topStrengths":[""],"potentialScoreAfter":0}';
            const scRaw=await callGroq(sP,{model:'openai/gpt-oss-120b',max_tokens:3000,temperature:0.1});
            const sd=xJSON(scRaw);
            const ds=dualScore(sd.scoreBreakdown);
            const fit={score:sd.matchScore,atsScore:ds.a,hmScore:ds.h,clearance:ds.cl,gaps:sd.topGaps||[],strengths:sd.topStrengths||[],categories:sd.scoreBreakdown,potential:sd.potentialScoreAfter};
            setFitData(fit);
            if(ws)await supabase.from('fit_snapshots').insert({workspace_id:ws.id,overall_score:fit.score,ats_score:fit.atsScore,hm_score:fit.hmScore,category_scores:fit.categories,potential_score:fit.potential});

            setStatus('');
            const vP=persona==='joshua'?`Score: ${fit.score}/100. ${fit.clearance}. Gap: ${fit.gaps[0]?.item||'none'}. Strength: ${fit.strengths[0]||'none'}. 2-3 sentences.`:`Score ${fit.score}/100. ${fit.clearance}. Gap: ${fit.gaps[0]?.item||'none'}. Strength: ${fit.strengths[0]||'none'}. 2-3 sentences Hinglish.`;
            const{text:v,cost}=await callLLM({system:`You are ${persona==='joshua'?'Joshua, direct career strategist':'Adi, Hinglish career dost'}. Plain text, no markdown.`,messages:[{role:'user',content:vP}],temperature:0.4,max_tokens:150,model:'haiku'});
            sessionCost+=(cost.total||0);

            add('assistant',v);
            add('fit',null,{fitData:fit});
            setActions([{label:'Rewrite my resume',action:'rewrite'},{label:'Find similar roles',action:'search_again'},{label:'New analysis',action:'new'}]);
            console.log('[pipeline] $'+sessionCost.toFixed(4));
          }catch(e){setStatus('');add('assistant','Error: '+e.message+'. Try again.');setMode('chat');}
          setBusy(false);
        };

        // Free chat handler (Fix 6: always allow conversation)
        const handleChat=async(text)=>{
          add('user',text);setBusy(true);
          // Check if this looks like a JD (long text with job-related keywords)
          if(text.length>200 && /responsibilities|requirements|qualifications|experience|role|position/i.test(text)){
            await analyze(text); return;
          }
          // Otherwise, use Haiku for a short conversational response
          try{
            const ctx=log.slice(-4).map(m=>m.content||'').join(' ');
            const{text:reply,cost}=await callLLM({
              system:`You are ${persona==='joshua'?'Joshua, direct career strategist. Short answers, 1-2 sentences. No markdown.':'Adi, Hinglish career dost. Short, 1-2 sentences. No markdown.'}`,
              messages:[{role:'user',content:`Context: User is ${char.name}'s type (${char.type}). Recent: ${ctx}\n\nUser says: "${text}"\n\nRespond briefly. If they seem ready to upload resume or provide JD, encourage it. If they want to search for roles, ask what kind.`}],
              temperature:0.4,max_tokens:120,model:'haiku'
            });
            sessionCost+=(cost.total||0);
            add('assistant',reply);
            // If no resume yet and they haven't explicitly asked for something else, gently remind
            if(!resumeText&&step>=3&&!actions){
              setActions([{label:'Upload resume',action:'upload'},{label:'Find me roles',action:'search_again'}]);
            }
          }catch(e){add('assistant','Connection issue — try again.');}
          setBusy(false);
        };

        const handleAction=(a)=>{
          setActions(null);
          if(a==='upload'){setMode('upload');}
          else if(a==='chat'){setMode('chat');add('assistant',persona==='joshua'?"Sure, what's on your mind?":"Haan bolo, kya sochna hai?");}
          else if(a==='search_again'){setMode('chat');add('assistant',persona==='joshua'?"What type of role are you looking for?":"Kis type ka role chahiye?");setStep(9);}
          else if(a==='rewrite'){add('assistant',persona==='joshua'?"Resume rewrite is coming in the next update. Use the gap analysis to guide your edits.":"Resume rewrite next update mein. Gap analysis follow karo abhi.");setActions([{label:'Find similar roles',action:'search_again'},{label:'New analysis',action:'new'}]);}
          else if(a==='new'){setResumeText('');setFitData(null);setJobs(null);setMode('upload');add('assistant',persona==='joshua'?"Drop your resume for the next role.":"Agla role ke liye resume daalo.");}
        };

        const send=()=>{
          if(!input.trim())return;
          const t=input.trim();setInput('');
          if(step>=1&&step<=2){handleAnswer(t);}
          else if(step===9){add('user',t);doSearch({q1:t});}
          else{handleChat(t);}
        };

        const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('rc_theme')||'dark';}catch{return'dark';}});
        const toggleTheme=()=>{const n=theme==='dark'?'light':'dark';setTheme(n);document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('rc_theme',n);}catch{}};

        return <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
          <nav style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--color-border)',background:'var(--color-surface)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}><button onClick={onBack} style={{background:'none',border:'none',padding:4,display:'flex',cursor:'pointer'}}><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="var(--color-text-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button><Av p={persona} size={30}/><div><div style={{fontSize:14,fontWeight:600}}>{persona==='joshua'?'Joshua':'Adi'}</div><div style={{fontSize:10,color:'var(--color-success)',display:'flex',alignItems:'center',gap:4}}><div style={{width:5,height:5,borderRadius:'50%',background:'var(--color-success)'}}/>online</div></div></div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>{fitData&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--color-primary)'}}>{fitData.score}/100</span>}<Logo size={14}/><button onClick={toggleTheme} style={{width:36,height:22,borderRadius:11,background:theme==='dark'?'var(--color-primary)':'var(--color-border)',border:'none',position:'relative',cursor:'pointer'}}><div style={{width:16,height:16,borderRadius:'50%',background:theme==='dark'?'var(--color-bg)':'#fff',position:'absolute',top:3,left:theme==='dark'?17:3,transition:'left .3s',boxShadow:'0 1px 2px rgba(0,0,0,.1)'}}/></button></div>
          </nav>

          <div style={{flex:1,overflowY:'auto',padding:'16px 0',display:'flex',flexDirection:'column',gap:14}}>
            <div style={{maxWidth:'var(--max-conversation)',width:'100%',margin:'0 auto',display:'flex',flexDirection:'column',gap:14}}>
              {log.map((m,i)=>{
                if(m.type==='assistant')return <Msg key={i} type="assistant" persona={persona}>{m.content}</Msg>;
                if(m.type==='user')return <Msg key={i} type="user">{m.content}</Msg>;
                if(m.type==='status')return <Msg key={i} type="status">{m.content}</Msg>;
                if(m.type==='fit')return <FitCard key={i} d={m.fitData}/>;
                if(m.type==='jobs')return <div key={i} className="msg-in" style={{padding:'0 16px 0 52px'}}><div style={{background:'var(--color-surface)',border:'1px solid var(--color-accent)',borderRadius:'var(--radius-lg)',padding:16,borderLeft:'3px solid var(--color-accent)'}}><div style={{fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--color-accent)',marginBottom:10}}>MATCHING ROLES</div>{(m.jobs||[]).map((j,k)=><div key={k} style={{marginBottom:k<(m.jobs||[]).length-1?10:0,paddingBottom:k<(m.jobs||[]).length-1?10:0,borderBottom:k<(m.jobs||[]).length-1?'1px solid var(--color-border-light)':'none'}}><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{j.title}</div>{j.snippet&&<div style={{fontSize:11,color:'var(--color-text-secondary)',marginBottom:3}}>{j.snippet}</div>}<a href={j.url} target="_blank" rel="noopener" style={{fontSize:11,color:'var(--color-primary)',textDecoration:'none'}}>{j.url.length>55?j.url.slice(0,55)+'...':j.url}</a></div>)}</div></div>;
                return null;
              })}
              {status&&<Msg type="status"><div style={{width:10,height:10,border:'2px solid var(--color-border)',borderTopColor:'var(--color-primary)',borderRadius:'50%',animation:'spin .8s linear infinite',flexShrink:0}}/>{status}</Msg>}
              {busy&&!status&&<Dots p={persona}/>}
              {actions&&<div className="msg-in" style={{padding:'0 16px 0 52px',display:'flex',gap:8,flexWrap:'wrap'}}>{actions.map((a,i)=><Btn key={i} label={a.label} onClick={()=>handleAction(a.action)} primary={i===0} small/>)}</div>}
              <div ref={bRef}/>
            </div>
          </div>

          {/* Upload zone */}
          {mode==='upload'&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <div onClick={()=>fRef.current?.click()} onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} style={{border:'2px dashed var(--color-border)',borderRadius:'var(--radius-md)',padding:14,textAlign:'center',cursor:'pointer'}}><div style={{fontSize:13,fontWeight:500,marginBottom:2}}>Drop resume here</div><div style={{fontSize:11,color:'var(--color-text-muted)'}}>PDF, DOCX, or TXT</div></div>
            <input ref={fRef} type="file" accept=".pdf,.docx,.doc,.txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
            <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8}}>
              <button onClick={()=>setMode('paste')} style={{fontSize:11,color:'var(--color-text-muted)',background:'none',border:'none',textDecoration:'underline',cursor:'pointer'}}>paste text</button>
              <button onClick={()=>{setMode('chat');add('assistant',persona==='joshua'?"No problem — what's on your mind?":"Koi baat nahi — bolo kya sochna hai?");}} style={{fontSize:11,color:'var(--color-text-muted)',background:'none',border:'none',textDecoration:'underline',cursor:'pointer'}}>chat instead</button>
            </div>
          </div></div>}

          {/* Paste zone */}
          {mode==='paste'&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <textarea placeholder="Paste resume text..." rows={4} style={{width:'100%',marginBottom:6}} id="rp"/>
            <div style={{display:'flex',gap:8}}><Btn label="Submit" primary onClick={()=>{const t=document.getElementById('rp').value.trim();if(t.length>20){setResumeText(t);setMode('chat');supabase.from('resumes').insert({user_id:user.id,raw_text:t,is_master:true});add('status','Resume — '+t.split(/\s+/).length+' words');setTimeout(()=>{add('assistant',persona==='joshua'?"Got it. Paste the JD now, or just tell me about the role you want.":"Resume mil gaya. JD paste karo ya role describe karo.");setStep(6);},400);}}} small/><button onClick={()=>setMode('chat')} style={{fontSize:11,color:'var(--color-text-muted)',background:'none',border:'none',cursor:'pointer'}}>cancel</button></div>
          </div></div>}

          {/* JD zone (for interview bomber) */}
          {mode==='jd'&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <textarea placeholder="Paste job description..." rows={4} value={jdText} onChange={e=>setJdText(e.target.value)} style={{width:'100%',marginBottom:6}}/>
            <div style={{display:'flex',gap:8}}><Btn label="Analyze" primary onClick={()=>{if(jdText.trim()){analyze(jdText.trim());setJdText('');}}} small/><button onClick={()=>{setMode('chat');add('assistant',persona==='joshua'?"No JD handy? Tell me about the role and company.":"JD nahi hai? Role aur company describe karo.");}} style={{fontSize:11,color:'var(--color-text-muted)',background:'none',border:'none',cursor:'pointer'}}>chat instead</button></div>
          </div></div>}

          {/* Text input (always available in chat mode) */}
          {mode==='chat'&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto',display:'flex',gap:8}}>
            <input ref={iRef} type="text" placeholder={persona==='joshua'?'Type here...':'Yahan likho...'} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} style={{flex:1,borderRadius:'var(--radius-md)',padding:'11px 16px'}}/>
            <button onClick={send} disabled={!input.trim()||busy} style={{width:40,height:40,borderRadius:'var(--radius-md)',background:'var(--color-primary)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',opacity:(!input.trim()||busy)?.4:1,cursor:'pointer'}}><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
          </div></div>}
        </div>;
      }

      // ═══ APP ═══
      function App(){
        const[session,setSession]=useState(null);const[profile,setProfile]=useState(null);const[loading,setLoading]=useState(true);
        const[char,setChar]=useState(null);const[persona,setPersona]=useState(null);
        useEffect(()=>{supabase.auth.getSession().then(({data:{session}})=>{setSession(session);if(session)ld(session.user);else setLoading(false);});const{data:{subscription}}=supabase.auth.onAuthStateChange((_,s)=>{setSession(s);if(s)ld(s.user);else{setProfile(null);setLoading(false);}});return()=>subscription.unsubscribe();},[]);
        const ld=async(u)=>{const{data}=await supabase.from('users').select('*').eq('id',u.id).single();setProfile(data);setLoading(false);};
        const so=async()=>{await supabase.auth.signOut();setSession(null);setProfile(null);setChar(null);setPersona(null);};
        if(loading)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:10}}><div style={{width:20,height:20,border:'3px solid var(--color-border)',borderTopColor:'var(--color-primary)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/><span style={{color:'var(--color-text-muted)',fontSize:14}}>Loading...</span></div>;
        if(!session)return <Auth/>;
        if(char&&persona)return <Convo user={session.user} char={char} persona={persona} onBack={()=>{setChar(null);setPersona(null);}}/>;
        if(char)return <PersonaPick char={char} onPick={setPersona}/>;
        return <CharSelect onPick={setChar}/>;
      }
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
