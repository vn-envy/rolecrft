    <style>
      /* ═══════════════════════════════════════════════════════
         ROLECRFT v2 — Brand CSS Tokens
         ═══════════════════════════════════════════════════════ */
      :root {
        --font-wordmark: 'Nunito', sans-serif;
        --font-body: 'DM Sans', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;

        --color-primary: #5A7738;
        --color-primary-light: #E8F0DF;
        --color-primary-muted: #7A9B5A;
        --color-accent: #D4813A;
        --color-accent-light: #FFF0E6;

        --color-joshua: #4A7A8C;
        --color-joshua-light: #E6F0F6;
        --color-adi: #C7692A;
        --color-adi-light: #FDE8DC;

        --color-bg: #FAF8F5;
        --color-surface: #FFFFFF;
        --color-elevated: #FFFFFF;
        --color-text: #2C2420;
        --color-text-secondary: #7A6E65;
        --color-text-muted: #A89E95;
        --color-border: #E8E0D8;
        --color-border-light: #F0EBE4;

        --color-success: #3D8B5E;
        --color-warning: #D4913A;
        --color-danger: #C75050;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 9999px;

        --max-conversation: 680px;
      }

      /* ─── Dark Theme ─────────────────────────────── */
      html[data-theme="dark"] {
        --color-primary: #7A9B5A;
        --color-primary-light: #2A3530;
        --color-primary-muted: #5A7738;
        --color-accent: #E8905A;
        --color-accent-light: #3A2A1E;
        --color-joshua: #5A9ABD;
        --color-joshua-light: #1E2E38;
        --color-adi: #D47A4A;
        --color-adi-light: #382218;
        --color-bg: #141210;
        --color-surface: #1C1A17;
        --color-elevated: #242220;
        --color-text: #F5F0EB;
        --color-text-secondary: #A89E95;
        --color-text-muted: #7A6E65;
        --color-border: #352F2A;
        --color-border-light: #2A2725;
        --color-success: #5AAD7A;
        --color-warning: #E8A04A;
        --color-danger: #E06060;
      }

      /* ─── Base ───────────────────────────────────── */
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: var(--font-body);
        background: var(--color-bg);
        color: var(--color-text);
        transition: background 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      input, textarea, select {
        font-family: var(--font-body);
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, background 0.3s, color 0.3s;
      }
      input:focus, textarea:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(122,155,90,0.15);
      }
      input::placeholder, textarea::placeholder { color: var(--color-text-muted); }
      button { font-family: var(--font-body); cursor: pointer; }
      button:active { transform: scale(0.97); }

      /* ─── Logo blink animation ───────────────────── */
      @keyframes blinkJ { 0%,100%{transform:scaleY(1)} 46%{transform:scaleY(1)} 50%{transform:scaleY(.08)} 54%{transform:scaleY(1)} }
      @keyframes blinkA { 0%,100%{transform:scaleY(1)} 46%{transform:scaleY(1)} 50%{transform:scaleY(.08)} 54%{transform:scaleY(1)} }
      .logo-dj { transform-origin: center center; animation: blinkJ 4s ease-in-out infinite; }
      .logo-da { transform-origin: center center; animation: blinkA 4s ease-in-out .04s infinite; }

      /* ─── Chat animations ────────────────────────── */
      @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .msg-in { animation: msgIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }
      @keyframes dotPulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
      .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-muted); }

      /* ─── Scrollbar ──────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
    </style>
</head>
<body>

    <script type="text/babel">
      const {useState,useEffect,useRef} = React;

      // ═══ CONFIG ═══
      const SUPABASE_URL = 'https://syrpitwhpsajthojpbcg.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_39eUMs3_hVddJhQozmtkxw_mBq1OOiS';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ═══ 7 CHARACTER STORIES ═══
      const CHARACTERS = [
        { id:'ananya', name:'Ananya', city:'Pune', type:'ghost', pack:'fresher',
          story:"I graduated last year but never really started looking. No resume, no LinkedIn, honestly not sure what I'm even qualified for.",

        { id:'meera', name:'Meera', city:'Delhi', type:'stalled', pack:'resume',
          story:"I've applied to 50+ roles in the last 3 months and I'm barely hearing back. My resume seems fine to me but clearly something isn't working.",
          hook:"Active applicant, zero callbacks — the problem might not be the resume" },
      ];

      // ═══ CHARACTER-SPECIFIC FOLLOW-UP QUESTIONS (2 per character, app-controlled) ═══
      const FOLLOW_UPS = {
        ananya: {
          joshua: [
            "What did you study, and was there any part of it you actually enjoyed working on?",
            "If you had to pick between a structured corporate path and something more startup-ish — gut instinct, which one?"
          ],
          adi: [
            "Kya padha tha, aur usme koi cheez thi jo actually pasand aayi?",
            "Corporate structured path ya startup wala scene — gut feeling, kya lagta hai?"
          ]
        },
        rohan: {
          joshua: [
            "Tell me about that internship — what did you actually build or work on?",
            "Are you targeting a specific kind of role, or open to seeing what fits your skills?"
          ],
          adi: [
            "Woh internship mein kya kiya tha — actually kya build ya kaam kiya?",
            "Koi specific role target kar rahe ho ya dekhna chahte ho kya fit hota hai?"
          ]
        },
        karthik: {
          joshua: [
            "What's your current role, and what specifically about it isn't working for you?",
            "When you imagine your ideal workday 2 years from now — what does it look like?"
          ],
          adi: [

            "2 saal baad ideal workday kaisa dikhta hai — imagine karo?",
          ]
        },
        priya: {
          joshua: [
            "What role are you targeting, and do you have a specific company or JD in mind?",
            "How many years of experience do you have, and what's been your strongest contribution?"
          ],
          adi: [

            "Kitne saal ka experience hai, aur ab tak sabse strong contribution kya raha?"
          ]
        },
        vikram: {
          joshua: [
            "Which round are you typically failing at — phone screens, technicals, or final rounds?",
            "Can you describe the last interview that went badly — what happened?"
          ],
          adi: [
            "Kaunse round mein usually fail hote ho — phone screen, technical, ya final?",
            "Last interview jo kharab gaya — kya hua tha exactly?"
          ]
        },
        nisha: {
          joshua: [
            "What's your current domain, and what specifically are you switching to?",
            "Is there anything from your current work that might translate — leadership, process, data?"
          ],
          adi: [
            "Abhi kaunsa domain hai aur kis mein jaana chahte ho?",
            "Current kaam se kuch translate hota hai kya — leadership, process, data?"
          ]
        },
        meera: {
          joshua: [
            "How are you finding and applying to these roles — job boards, referrals, LinkedIn?",
            "When you look at the JDs you're applying to, do they match your experience level or are you stretching?"
          ],
          adi: [
            "Roles kaise dhundh rahe ho — job boards, referrals, LinkedIn?",
            "Jo JDs mein apply kar rahe ho, woh tumhare experience level ke hain ya stretch kar rahe ho?"
          ]
        },
      };

      // ═══ VOICE TEMPLATES ═══
      const VOICE = {
        joshua: {
          confirm: (char) => `That sounds like where you are. ${char.type === 'bomber' ? "The good news — your resume is probably not the problem. Let's figure out what is." : char.type === 'ghost' || char.type === 'freshgrad' ? "No pressure — let's figure out what you're working with first." : "I've seen this exact situation many times. A couple of quick questions and I'll know exactly how to help."}`,
          transition_resume: "Good — I've got enough to work with. Drop your resume here and I'll start scoring it.",
          transition_jd: "Now paste the job description you're targeting. If you don't have one specific JD, describe the role you want.",
          transition_search: "Let me find some roles that fit what you've described.",
          transition_fresher: "Let me build something from what you've told me.",
        },
        adi: {
          confirm: (char) => `Sahi pakde ho. ${char.type === 'bomber' ? "Ek acchi baat — resume mein problem nahi hoga shayad. Chalte hain dekhte hain kya ho raha hai." : char.type === 'ghost' || char.type === 'freshgrad' ? "Koi tension nahi — pehle dekhte hain kya hai hamare paas." : "Yeh situation bahut dekhi hai. Do-teen cheezein puchta hoon, phir exactly pata chalega kya karna hai."}`,
          transition_resume: "Theek hai, enough context mil gaya. Resume daal do, scoring shuru karta hoon.",
          transition_jd: "Ab JD paste karo — jo role target kar rahe ho uska. Specific JD nahi hai toh role describe kar do.",
          transition_search: "Chal dekhte hain kya roles milte hain tumhare liye.",
          transition_fresher: "Jo bataya hai usse kuch build karta hoon.",
        }
      };

      // ═══ API + ENGINE (carried forward) ═══
      let sessionCost = 0;

      async function callLLM({system,messages,temperature=0.4,max_tokens=200,model='haiku'}) {
        const res = await fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,messages,temperature,max_tokens,model})});
        const data = await res.json(); if(!res.ok) throw new Error(data.error||'API error');
        const tb=(data.content||[]).find(c=>c.type==='text');
        return {text:tb?tb.text:'',cost:data.cost||{}};
      }

      async function callSearch(queries) {
        try{const res=await fetch("/.netlify/functions/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({queries})});const data=await res.json();return data.searchAvailable?data.results:null;}catch{return null;}
      }

      function extractJsonObject(raw){const t=(raw||"").trim().replace(/```json\s*/gi,"").replace(/```\s*/g,"");const s=t.indexOf("{"),e=t.lastIndexOf("}");if(s===-1||e<=s)throw new Error("No JSON");return JSON.parse(t.slice(s,e+1));}

      const GROQ_FB={'openai/gpt-oss-120b':'llama-3.3-70b-versatile','llama-3.1-8b-instant':'llama-3.3-70b-versatile'};
      async function callGroq(prompt,opts={}){const{temperature=0.2,max_tokens=4096,model='openai/gpt-oss-120b',retries=2,_fb=false}=opts;const fp=prompt+'\n\nOutput ONLY valid JSON.';for(let i=0;i<=retries;i++){const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),25000);try{const res=await fetch("/.netlify/functions/transform",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:fp,temperature,max_tokens,model}),signal:ctrl.signal});clearTimeout(tid);const text=await res.text();let data;try{data=JSON.parse(text);}catch{data={error:text};}if(!res.ok)throw new Error(data?.error||'err');const f=(data.content||[]).find(c=>c.type==="text");return f?f.text:"";}catch(err){clearTimeout(tid);if(i===retries){const fb=GROQ_FB[model];if(fb&&!_fb)return callGroq(prompt,{...opts,model:fb,retries:1,_fb:true});throw err;}await new Promise(r=>setTimeout(r,1500*(i+1)));}}}

      function validateCompanyData(d){d.techStack=d.techStack||[];d.coreValues=d.coreValues||[];d.culturalTone=d.culturalTone||"professional";d.emphasize=d.emphasize||[];d.redFlags=d.redFlags||[];return d;}
      function validateJDData(d){d.mandatorySkills=d.mandatorySkills||[];d.actionVerbs=d.actionVerbs||["Led","Built","Designed"];d.niceToHave=d.niceToHave||[];d.responsibilityPatterns=d.responsibilityPatterns||[];return d;}
      function computeDualScores(bd){if(!bd)return{atsScore:0,hmScore:0,clearance:'Grounded'};const g=k=>{const d=bd[k];return d?(d.score/d.max)*100:0;};const a=Math.round(g('mustHaveCoverage')*.40+g('atsStructure')*.25+g('domainTooling')*.20+g('responsibilitiesAlignment')*.15);const h=Math.round(g('impactMetrics')*.30+g('seniorityScope')*.25+g('tonalityFit')*.20+g('differentiators')*.15+g('responsibilitiesAlignment')*.10);return{atsScore:a,hmScore:h,clearance:(a>=75&&h>=70)?'Cleared':(a<50||h<45)?'Grounded':'Conditional'};}
      function formatSearchContext(sr){if(!sr)return '';let c='';Object.entries(sr).forEach(([q,items])=>{c+=`"${q}":\n`;items.forEach((r,i)=>{c+=`${r.title} - ${r.snippet}\n`;});});return c;}

      async function parseResumeFile(file){const ext=file.name.split('.').pop().toLowerCase();if(!['pdf','docx','doc','txt'].includes(ext))throw new Error('Use PDF, DOCX, or TXT.');let text='';if(ext==='txt')text=await file.text();else if(ext==='docx'||ext==='doc'){const ab=await file.arrayBuffer();text=(await mammoth.extractRawText({arrayBuffer:ab})).value;}else if(ext==='pdf'){const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const p=[];for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();p.push(ct.items.map(it=>it.str).join(' '));}text=p.join('\n\n');}text=text.trim();if(text.length<20)throw new Error('Could not extract text.');return text;}


      // ═══ UI COMPONENTS ═══

      function Logo({size=20}){const b=Math.round(size*0.8);return(<div style={{display:'flex',alignItems:'center'}}><span style={{fontFamily:'var(--font-wordmark)',fontWeight:800,fontSize:size,letterSpacing:'-0.5px',color:'var(--color-text)',lineHeight:1}}>r</span><svg width={b} height={b} viewBox="0 0 20 20" style={{margin:'0 -0.5px',position:'relative',top:Math.round(b/18),flexShrink:0}}><path d="M3 10C3 6.134 6.134 3 10 3C13.866 3 17 6.134 17 10C17 13.866 13.866 17 10 17H4.5C3.672 17 3 16.328 3 15.5V10Z" fill="var(--color-primary-light)" stroke="var(--color-primary)" strokeWidth="1.1" strokeLinejoin="round"/><circle className="logo-dj" cx="8" cy="10" r="1.6" fill="var(--color-joshua)"/><circle className="logo-da" cx="12.5" cy="10" r="1.6" fill="var(--color-adi)"/></svg><span style={{fontFamily:'var(--font-wordmark)',fontWeight:800,fontSize:size,letterSpacing:'-0.5px',color:'var(--color-text)',lineHeight:1}}>lecrft</span></div>);}

      function Avatar({persona,size=32}){const j=persona==='joshua';return(<div style={{width:size,height:size,borderRadius:'50%',background:j?'var(--color-joshua)':'var(--color-adi)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-wordmark)',fontSize:Math.round(size*.42),fontWeight:800,flexShrink:0}}>{j?'J':'A'}</div>);}

      function Bubble({type,persona,children}){
        if(type==='user') return <div className="msg-in" style={{display:'flex',justifyContent:'flex-end',padding:'0 16px'}}><div style={{background:'var(--color-primary-muted)',color:'#fff',borderRadius:'14px 4px 14px 14px',padding:'10px 14px',fontSize:14,lineHeight:1.55,maxWidth:'78%'}}>{children}</div></div>;
        if(type==='status') return <div className="msg-in" style={{display:'flex',justifyContent:'center',padding:'4px 16px'}}><div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--color-text-muted)',fontWeight:500,background:'var(--color-elevated)',border:'1px solid var(--color-border-light)',borderRadius:'var(--radius-full)',padding:'4px 14px'}}>{children}</div></div>;
        return <div className="msg-in" style={{display:'flex',gap:8,padding:'0 16px',maxWidth:'88%'}}><Avatar persona={persona} size={28}/><div style={{background:'var(--color-elevated)',border:'1px solid var(--color-border)',borderRadius:'4px 14px 14px 14px',padding:'10px 14px',fontSize:14,lineHeight:1.55}}>{children}</div></div>;
      }

      function Dots({persona}){return <div className="msg-in" style={{display:'flex',gap:8,padding:'0 16px'}}><Avatar persona={persona} size={28}/><div style={{display:'flex',gap:5,padding:'12px 16px',background:'var(--color-elevated)',border:'1px solid var(--color-border)',borderRadius:'4px 14px 14px 14px'}}>{[0,.15,.3].map(d=><div key={d} style={{width:7,height:7,borderRadius:'50%',background:'var(--color-text-muted)',animation:`dotPulse 1.2s ease-in-out ${d}s infinite`}}/>)}</div></div>;}

      function Btn({label,onClick,primary}){return <button onClick={onClick} style={{padding:'8px 18px',borderRadius:'var(--radius-md)',background:primary?'var(--color-primary)':'var(--color-surface)',color:primary?'#fff':'var(--color-text)',border:primary?'none':'1px solid var(--color-border)',fontSize:13,fontWeight:600,cursor:'pointer'}}>{label}</button>;}

      function FitCard({data}){if(!data)return null;const{score,atsScore,hmScore,clearance,gaps,strengths,categories,potential}=data;const cl=clearance==='Cleared'?'var(--color-success)':clearance==='Grounded'?'var(--color-danger)':'var(--color-warning)';
        return <div className="msg-in" style={{padding:'0 16px 0 52px'}}><div style={{background:'var(--color-surface)',border:'1px solid var(--color-primary)',borderRadius:'var(--radius-lg)',padding:16,borderLeft:'3px solid var(--color-primary)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--color-primary)'}}>FIT SNAPSHOT</span><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontFamily:'var(--font-mono)',fontSize:22,fontWeight:600,color:'var(--color-primary)'}}>{score}</span><span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:'var(--radius-full)',background:cl+'18',color:cl}}>{clearance}</span></div></div>
          <div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}}>{[['ATS',atsScore],['HM',hmScore]].map(([l,v])=><div key={l} style={{flex:'1 1 50px',textAlign:'center',padding:5,background:'var(--color-elevated)',borderRadius:'var(--radius-sm)',border:'1px solid var(--color-border-light)'}}><div style={{fontSize:9,color:'var(--color-text-muted)'}}>{l}</div><div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:600,color:v>=65?'var(--color-success)':'var(--color-warning)'}}>{v}</div></div>)}</div>
          {gaps&&gaps.length>0&&<div style={{background:'var(--color-accent-light)',borderRadius:'var(--radius-sm)',padding:8,marginBottom:6}}><div style={{fontSize:9,fontWeight:700,color:'var(--color-accent)',marginBottom:3}}>GAPS</div>{gaps.slice(0,3).map((g,i)=><div key={i} style={{fontSize:11,color:'var(--color-text-secondary)',marginBottom:1}}>{g.item||g} — {g.reason||''}</div>)}</div>}

      // ═══ CONVERSATION PAGE (deterministic + persona warmth) ═══
      function ConvoPage({user,character,persona,onBack}){
        const [log,setLog] = useState([]);
        const [input,setInput] = useState('');
        const [step,setStep] = useState(0); // 0=confirm, 1=follow-up-1, 2=follow-up-2, 3=routing, 4+=artifact
        const [answers,setAnswers] = useState({});
        const [resumeText,setResumeText] = useState('');
        const [jdText,setJdText] = useState('');
        const [fitData,setFitData] = useState(null);
        const [jobs,setJobs] = useState(null);
        const [busy,setBusy] = useState(false);
        const [statusText,setStatusText] = useState('');
        const [showUpload,setShowUpload] = useState(false);
        const [showJd,setShowJd] = useState(false);
        const [showPaste,setShowPaste] = useState(false);
        const [actions,setActions] = useState(null);
        const bottomRef = useRef(null);
        const inputRef = useRef(null);
        const fileRef = useRef(null);
        const v = VOICE[persona];
        const fups = FOLLOW_UPS[character.id][persona];

        useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[log,busy,statusText,actions]);
        useEffect(()=>{inputRef.current?.focus();},[step,showUpload,showJd]);

        const add = (type,content,extra={}) => setLog(prev=>[...prev,{type,content,...extra}]);

        // Boot: confirmation + first follow-up
        useEffect(()=>{
          const confirmText = v.confirm(character);
          add('assistant', confirmText);
          setTimeout(()=>{
            add('assistant', fups[0]);
            setStep(1);
          },700);

          // Store self-selected persona
          supabase.from('users').update({persona_blend:{self_selected:character.id,character_type:character.type,pack:character.pack}}).eq('id',user.id);
        },[]);

        // Handle answer to follow-up questions
        const handleAnswer = (text) => {
          add('user', text);
          setAnswers(prev=>({...prev, ['q'+step]: text}));

          if(step === 1){
            // Ask follow-up 2
            setTimeout(()=>{
              add('assistant', fups[1]);
              setStep(2);
            },500);
          } else if(step === 2){
            // Route based on character type
            setTimeout(()=>route({...answers, q2:text}),500);
          }
        };

        // Deterministic routing after 2 follow-ups
        const route = (allAnswers) => {
          setStep(3);
          const type = character.type;

          if(type === 'ghost' || type === 'freshgrad'){
            // Fresher path — search for roles
            add('assistant', v.transition_search);
            setTimeout(()=>searchJobs(allAnswers),400);
          } else if(type === 'bomber'){
            // Interview path — skip resume, ask for JD
            add('assistant', v.transition_jd);
            setShowJd(true); setStep(4);
          } else {
            // Resume path (buried, drifter, switcher, stalled)
            add('assistant', v.transition_resume);
            setShowUpload(true); setStep(4);
          }
        };

        // Serper job search
        const searchJobs = async(ctx)=>{
          setBusy(true); setStatusText('Searching for roles...');
          try{
            const field = ctx.q1 || character.story;
            const queries = [`${field} jobs India site:linkedin.com/jobs`, `${field} hiring India site:naukri.com OR site:wellfound.com`, `entry level ${field} India openings`];
            const results = await callSearch(queries);
            let jl=[]; if(results)Object.values(results).forEach(items=>(items||[]).forEach(r=>{if(r.title&&r.url&&!jl.find(j=>j.url===r.url))jl.push({title:r.title,url:r.url,snippet:(r.snippet||'').slice(0,180)});}));
            jl=jl.slice(0,5); setStatusText('');
            if(jl.length>0){setJobs(jl);add('jobs',null,{jobs:jl});setActions([{label:'Upload resume for one of these',action:'upload'},{label:'Search different roles',action:'search'}]);}
            else{add('assistant',persona==='joshua'?"Didn't find strong matches. Upload your resume and a JD — I'll score your fit directly.":"Strong matches nahi mile. Resume aur JD do, direct scoring karta hoon.");setShowUpload(true);}
          }catch{setStatusText('');add('assistant','Search failed — upload resume and JD instead.');setShowUpload(true);}
          setBusy(false);setStep(5);
        };

        // File upload
        const handleFile = async(file)=>{
          if(!file)return;setBusy(true);setShowUpload(false);setShowPaste(false);
          add('status','Parsing '+file.name+'...');
          try{
            const t=await parseResumeFile(file);setResumeText(t);
            add('status','Resume parsed — '+t.split(/\s+/).length+' words');
            await supabase.from('resumes').insert({user_id:user.id,raw_text:t,is_master:true,version:1});
            setTimeout(()=>{add('assistant',v.transition_jd);setShowJd(true);},400);
          }catch(err){add('assistant','Could not read — '+err.message+'. Try pasting text.');setShowPaste(true);}
          setBusy(false);
        };

        // JD + analysis pipeline
        const analyze = async()=>{
          if(!jdText.trim())return;
          const jd=jdText.trim();setShowJd(false);setJdText('');
          add('user',jd.length>150?jd.slice(0,150)+'...':jd);
          add('assistant',persona==='joshua'?'Give me a moment — scoring your fit.':'Ek minute — fit score nikaal raha hoon.');
          setBusy(true);
          try{
            setStatusText('Identifying role...');
            const{text:eJ}=await callLLM({system:'Extract company and role. ONLY JSON: {"company":"","role":""}',messages:[{role:'user',content:jd.slice(0,2000)}],temperature:0.1,max_tokens:80,model:'haiku'});
            let ext;try{ext=extractJsonObject(eJ);}catch{ext={company:'Company',role:'Role'};}
            add('status',ext.role+' at '+ext.company);

            const{data:ws}=await supabase.from('workspaces').insert({user_id:user.id,role_title:ext.role,company:ext.company,jd_raw:jd,status:'analyzing'}).select().single();

            setStatusText('Researching '+ext.company+'...');
            const sr=await callSearch([ext.company+' engineering culture',ext.company+' '+ext.role+' interview',ext.company+' glassdoor']);
            const sCtx=formatSearchContext(sr);
            const cRaw=await callGroq('Analyze '+ext.company+' for '+ext.role+'.\n'+sCtx+'\nReturn JSON: {"techStack":[],"coreValues":[],"interviewFocus":"","culturalTone":"","redFlags":[],"emphasize":[]}',{model:'openai/gpt-oss-120b',max_tokens:2500});
            const cd=validateCompanyData(extractJsonObject(cRaw));

            setStatusText('Parsing JD...');
            const jRaw=await callGroq('Parse JD.\nJD:\n'+jd+'\nReturn JSON: {"mandatorySkills":[],"niceToHave":[],"actionVerbs":[],"responsibilityPatterns":[],"hiddenRequirements":[],"winningPhrases":[]}',{model:'llama-3.1-8b-instant',max_tokens:2500,temperature:0.1});
            const jdD=validateJDData(extractJsonObject(jRaw));
            if(ws)await supabase.from('workspaces').update({jd_parsed:jdD,company_data:cd}).eq('id',ws.id);

            setStatusText('Scoring fit...');
            const sourceText = resumeText || (answers.q1||'')+' '+(answers.q2||'');
            const sP='Score resume vs JD.\nRESUME:\n'+sourceText.slice(0,3000)+'\nCOMPANY:'+JSON.stringify(cd)+'\nJD:'+JSON.stringify(jdD)+'\nTARGET:'+ext.role+' at '+ext.company+'\nRubric(100):MustHave(30),Responsibilities(12),Tonality(8),Metrics(15),Seniority(10),ATS(10),Tooling(10),Differentiators(5).\nReturn JSON:{"matchScore":0,"scoreBreakdown":{"mustHaveCoverage":{"score":0,"max":30,"detail":""},"responsibilitiesAlignment":{"score":0,"max":12,"detail":""},"tonalityFit":{"score":0,"max":8,"detail":""},"impactMetrics":{"score":0,"max":15,"detail":""},"seniorityScope":{"score":0,"max":10,"detail":""},"atsStructure":{"score":0,"max":10,"detail":""},"domainTooling":{"score":0,"max":10,"detail":""},"differentiators":{"score":0,"max":5,"detail":""}},"topGaps":[{"item":"","reason":""}],"topStrengths":[""],"potentialScoreAfter":0}';
            const scRaw=await callGroq(sP,{model:'openai/gpt-oss-120b',max_tokens:3000,temperature:0.1});
            const sd=extractJsonObject(scRaw);
            const dual=computeDualScores(sd.scoreBreakdown);
            const fit={score:sd.matchScore,atsScore:dual.atsScore,hmScore:dual.hmScore,clearance:dual.clearance,gaps:sd.topGaps||[],strengths:sd.topStrengths||[],categories:sd.scoreBreakdown,potential:sd.potentialScoreAfter};
            setFitData(fit);
            if(ws)await supabase.from('fit_snapshots').insert({workspace_id:ws.id,overall_score:fit.score,ats_score:fit.atsScore,hm_score:fit.hmScore,category_scores:fit.categories,potential_score:fit.potential});

            setStatusText('');
            const vPrompt=persona==='joshua'?`Score: ${fit.score}/100. ${fit.clearance}. Gap: ${fit.gaps[0]?.item||'none'}. Strength: ${fit.strengths[0]||'none'}. 2-3 sentences, direct.`:`Score aaya ${fit.score}/100. ${fit.clearance}. Gap: ${fit.gaps[0]?.item||'none'}. Strength: ${fit.strengths[0]||'none'}. 2-3 sentences.`;
            const{text:verdict,cost}=await callLLM({system:`You are ${persona==='joshua'?'Joshua, direct career strategist':'Adi, Hinglish career dost'}. No markdown. Plain text.`,messages:[{role:'user',content:vPrompt}],temperature:0.4,max_tokens:150,model:'haiku'});
            sessionCost+=(cost.total||0);

            add('assistant',verdict);
            add('fit',null,{fitData:fit});
            setActions([{label:'Rewrite resume for this role',action:'rewrite'},{label:'Find similar roles',action:'search'},{label:'Analyze different role',action:'new'}]);
            console.log('[pipeline] Session: $'+sessionCost.toFixed(4));
          }catch(err){setStatusText('');add('assistant','Analysis error: '+err.message+'. Try pasting JD again.');setShowJd(true);}
          setBusy(false);
        };

        // Post-artifact actions
        const handleAction=(a)=>{
          setActions(null);
          if(a==='upload'){setShowUpload(true);}
          else if(a==='search'){add('assistant',persona==='joshua'?"What type of role?":"Kis type ka role?");setStep(9);}
          else if(a==='rewrite'){add('assistant',persona==='joshua'?"Resume rewrite is coming in the next update. Use the gap analysis to guide your edits for now.":"Resume rewrite next update mein aayega. Abhi gap analysis follow karo.");setActions([{label:'Find similar roles',action:'search'},{label:'New analysis',action:'new'}]);}
          else if(a==='new'){setResumeText('');setFitData(null);setJobs(null);add('assistant',v.transition_resume);setShowUpload(true);}
        };

        // Text input
        const send=()=>{
          if(!input.trim())return;
          const t=input.trim();setInput('');
          if(step>=1&&step<=2){handleAnswer(t);}
          else if(step===9){add('user',t);searchJobs({q1:t});}
          else if(showJd){setJdText(t);setTimeout(()=>analyze(),50);}
        };

        const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('rc_theme')||'dark';}catch{return'dark';}});
        const toggleTheme=()=>{const n=theme==='dark'?'light':'dark';setTheme(n);document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('rc_theme',n);}catch{}};

        const showText = (step>=1&&step<=2)||step===9;

        return <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
          <nav style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--color-border)',background:'var(--color-surface)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button onClick={onBack} style={{background:'none',border:'none',padding:4,display:'flex',cursor:'pointer'}}><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="var(--color-text-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
              <Avatar persona={persona} size={30}/>
              <div><div style={{fontSize:14,fontWeight:600}}>{persona==='joshua'?'Joshua':'Adi'}</div><div style={{fontSize:10,color:'var(--color-success)',display:'flex',alignItems:'center',gap:4}}><div style={{width:5,height:5,borderRadius:'50%',background:'var(--color-success)'}}/>online</div></div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {fitData&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--color-primary)'}}>{fitData.score}/100</span>}
              <Logo size={14}/>
              <button onClick={toggleTheme} style={{width:36,height:22,borderRadius:11,background:theme==='dark'?'var(--color-primary)':'var(--color-border)',border:'none',position:'relative',cursor:'pointer'}}><div style={{width:16,height:16,borderRadius:'50%',background:theme==='dark'?'var(--color-bg)':'#fff',position:'absolute',top:3,left:theme==='dark'?17:3,transition:'left .3s cubic-bezier(.34,1.56,.64,1)',boxShadow:'0 1px 2px rgba(0,0,0,.1)'}}/></button>
            </div>
          </nav>

          <div style={{flex:1,overflowY:'auto',padding:'16px 0',display:'flex',flexDirection:'column',gap:14}}>
            <div style={{maxWidth:'var(--max-conversation)',width:'100%',margin:'0 auto',display:'flex',flexDirection:'column',gap:14}}>
              {log.map((m,i)=>{
                if(m.type==='assistant')return <Bubble key={i} type="assistant" persona={persona}>{m.content}</Bubble>;
                if(m.type==='user')return <Bubble key={i} type="user">{m.content}</Bubble>;
                if(m.type==='status')return <Bubble key={i} type="status">{m.content}</Bubble>;
                if(m.type==='fit')return <FitCard key={i} data={m.fitData}/>;
                if(m.type==='jobs')return <JobList key={i} jobs={m.jobs}/>;
                return null;
              })}
              {statusText&&<Bubble type="status"><div style={{width:10,height:10,border:'2px solid var(--color-border)',borderTopColor:'var(--color-primary)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>{statusText}</Bubble>}
              {busy&&!statusText&&<Dots persona={persona}/>}
              {actions&&<div className="msg-in" style={{padding:'0 16px 0 52px',display:'flex',gap:8,flexWrap:'wrap'}}>{actions.map((a,i)=><Btn key={i} label={a.label} onClick={()=>handleAction(a.action)} primary={i===0}/>)}</div>}
              <div ref={bottomRef}/>
            </div>
          </div>

          {showUpload&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <div onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--color-primary)';}} onDragLeave={e=>e.currentTarget.style.borderColor='var(--color-border)'} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} style={{border:'2px dashed var(--color-border)',borderRadius:'var(--radius-md)',padding:16,textAlign:'center',cursor:'pointer'}}><div style={{fontSize:13,fontWeight:500,marginBottom:3}}>Drop your resume here</div><div style={{fontSize:11,color:'var(--color-text-muted)'}}>PDF, DOCX, or TXT</div></div>
            <input ref={fileRef} type="file" accept=".pdf,.docx,.doc,.txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
            <div style={{textAlign:'center',marginTop:6}}><button onClick={()=>{setShowUpload(false);setShowPaste(true);}} style={{fontSize:11,color:'var(--color-text-muted)',background:'none',border:'none',textDecoration:'underline',cursor:'pointer'}}>or paste text</button></div>
          </div></div>}

          {showPaste&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <textarea placeholder="Paste resume text..." rows={5} style={{width:'100%',marginBottom:6}} id="rp"/>
            <Btn label="Submit" primary onClick={()=>{const t=document.getElementById('rp').value.trim();if(t.length>20){setResumeText(t);setShowPaste(false);supabase.from('resumes').insert({user_id:user.id,raw_text:t,is_master:true});add('status','Resume — '+t.split(/\s+/).length+' words');setTimeout(()=>{add('assistant',v.transition_jd);setShowJd(true);},400);}}}/>
          </div></div>}

          {showJd&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto'}}>
            <textarea placeholder="Paste job description..." rows={4} value={jdText} onChange={e=>setJdText(e.target.value)} style={{width:'100%',marginBottom:6}}/>
            <Btn label="Analyze" primary onClick={analyze}/>
          </div></div>}

          {showText&&!showUpload&&!showPaste&&!showJd&&<div style={{padding:'10px 16px',borderTop:'1px solid var(--color-border)',background:'var(--color-surface)'}}><div style={{maxWidth:'var(--max-conversation)',margin:'0 auto',display:'flex',gap:8}}>
            <input ref={inputRef} type="text" placeholder={persona==='joshua'?'Your answer...':'Jawab likho...'} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} style={{flex:1,borderRadius:'var(--radius-md)',padding:'11px 16px'}}/>
            <button onClick={send} disabled={!input.trim()||busy} style={{width:40,height:40,borderRadius:'var(--radius-md)',background:'var(--color-primary)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',opacity:(!input.trim()||busy)?.4:1,cursor:'pointer'}}><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
          </div></div>}
        </div>;
      }


      // ═══ APP ═══
      function App(){
        const[session,setSession]=useState(null);const[profile,setProfile]=useState(null);const[loading,setLoading]=useState(true);
        const[character,setCharacter]=useState(null);const[persona,setPersona]=useState(null);

        useEffect(()=>{supabase.auth.getSession().then(({data:{session}})=>{setSession(session);if(session)load(session.user);else setLoading(false);});const{data:{subscription}}=supabase.auth.onAuthStateChange((_,s)=>{setSession(s);if(s)load(s.user);else{setProfile(null);setLoading(false);}});return()=>subscription.unsubscribe();},[]);
        const load=async(u)=>{const{data}=await supabase.from('users').select('*').eq('id',u.id).single();setProfile(data);setLoading(false);};
        const signOut=async()=>{await supabase.auth.signOut();setSession(null);setProfile(null);setCharacter(null);setPersona(null);};

        if(loading)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:10}}><div style={{width:20,height:20,border:'3px solid var(--color-border)',borderTopColor:'var(--color-primary)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/><span style={{color:'var(--color-text-muted)',fontSize:14}}>Loading...</span></div>;
        if(!session) return <AuthScreen/>;
        if(character && persona) return <ConvoPage user={session.user} character={character} persona={persona} onBack={()=>{setCharacter(null);setPersona(null);}}/>;
        if(character) return <PersonaSelect character={character} onSelect={setPersona}/>;
        return <CharacterSelect onSelect={setCharacter}/>;
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
